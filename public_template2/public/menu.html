        tailwind.config = {

    <style>
        body {

            background: #FFFDF7;

        .font-display {

        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-glow {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(61, 107, 61, 0.3);
        }

        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.08);
        }

        .nav-warm {
            backdrop-filter: blur(16px);
            background: rgba(255, 253, 247, 0.92);
            border-bottom: 1px solid rgba(212, 168, 67, 0.15);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 999;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
            transition: transform 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        .category-tab {
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-tab.active {
            color: #3D6B3D;
            border-color: #3D6B3D;
            background: rgba(61, 107, 61, 0.08);
        }

        .gold-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #D4A843, transparent);
            margin: 0 auto;
        }

        .separator {
            display: flex;
            align-items: center;
            gap: 16px;
            justify-content: center;
        }

        .separator::before,
        .separator::after {
            content: '';
            width: 40px;
            height: 1px;
            background: #D4A843;
        }

</head>

<body>

    <!-- HERO -->
    <section class="pt-32 pb-16 bg-cream-50">
        <div class="max-w-7xl mx-auto px-4 text-center">

                    class="text-gold-500 text-xs tracking-[0.3em] uppercase font-medium">Cardápio</span></div>
            <h1 class="font-display text-4xl md:text-6xl font-bold text-charcoal-900 mb-4">Nosso Cardápio</h1>

                selecionados e dedicação artesanal.</p>

    <!-- CATEGORY TABS -->
    <section class="sticky top-16 md:top-20 z-40 bg-cream-50/95 backdrop-blur border-b border-gold-400/10">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex gap-2 overflow-x-auto py-4 scrollbar-hide" id="category-tabs">
                <button
                    class="category-tab active px-5 py-2 rounded-full border border-forest-500 text-forest-600 text-sm font-medium whitespace-nowrap"
                    data-category="all">Todos</button>

    <!-- MENU GRID -->
    <section class="py-16 bg-cream-50">
        <div class="max-w-7xl mx-auto px-4" id="menu-container">
            <div class="text-center py-20 text-charcoal-800/40">Carregando cardápio...</div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-charcoal-900 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-white/30 text-sm" id="footer-copy">© 2026 Sabor & Arte</p>
            <a href="/privacy" class="text-white/20 hover:text-gold-300 text-xs mt-2 inline-block transition">Política de Privacidade</a>
        </div>

    <!-- WHATSAPP -->
    <a href="#" id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
        </svg>
    </a>

    <script src="/js/performance.js"></script>
    <script src="/js/mobile.js"></script>
    <script src="/js/a11y.js"></script>
    <script src="/js/feedback.js"></script>
    <script src="/js/formValidation.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/whatsappFormatter.js"></script>
    <script src="/js/orderModal.js"></script>
    <script src="/js/cartUI.js"></script>
    <script>
        // --- Menu Page Logic ---
        let allCategories = [];
        let allDishes = [];
        let activeCategory = 'all';

        async function loadMenu() {
            const categories = await api('/categories');
            if (!categories) return;
            allCategories = categories;
            allDishes = categories.flatMap(cat => cat.dishes.map(d => ({ ...d, category: { id: cat.id, name: cat.name, slug: cat.slug } })));

            // Sprint 1 - S1-T6: Skeleton loaders for tabs
            const tabsContainer = document.getElementById('category-tabs');
            if (window.feedback && window.feedback.skeletons) {
                tabsContainer.innerHTML = window.feedback.skeletons.categoryTabs();
            }

            tabsContainer.innerHTML = `
                <button class="category-tab active px-5 py-2 rounded-full border border-forest-500 text-forest-600 text-sm font-medium whitespace-nowrap bg-forest-500/5" data-category="all" onclick="filterCategory('all')">Todos</button>
                ${categories.map(cat => `
                    <button class="category-tab px-5 py-2 rounded-full border border-charcoal-800/10 text-charcoal-800/50 text-sm font-medium whitespace-nowrap" data-category="${cat.slug}" onclick="filterCategory('${cat.slug}')">${cat.name}</button>
                `).join('')}
            `;

            renderDishes(allDishes);

            if (window.location.hash) {
                const slug = window.location.hash.slice(1);
                filterCategory(slug);
            }
        }

        function filterCategory(slug) {
            activeCategory = slug;
            document.querySelectorAll('.category-tab').forEach(tab => {
                if (tab.dataset.category === slug) {
                    tab.classList.add('active');
                    tab.classList.remove('border-charcoal-800/10', 'text-charcoal-800/50');
                    tab.classList.add('border-forest-500', 'text-forest-600', 'bg-forest-500/5');
                } else {
                    tab.classList.remove('active', 'border-forest-500', 'text-forest-600', 'bg-forest-500/5');
                    tab.classList.add('border-charcoal-800/10', 'text-charcoal-800/50');
                }
            });
            const filtered = slug === 'all' ? allDishes : allDishes.filter(d => d.category.slug === slug);
            renderDishes(filtered);
        }

        function renderDishes(dishes) {
            const container = document.getElementById('menu-container');
            
            // Sprint 1 - S1-T6: Skeleton loaders
            if (window.feedback && window.feedback.skeletons) {
                container.innerHTML = window.feedback.skeletons.menuCards(6);
            }

            if (dishes.length === 0) {
                container.innerHTML = '<p class="text-center py-20 text-charcoal-800/40">Nenhum prato encontrado.</p>';
                return;
            }

            container.innerHTML = `
                <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                    ${dishes.map(dish => `
                        <div class="card-hover reveal visible bg-white rounded-2xl overflow-hidden border border-gold-400/10 flex flex-col shadow-sm">
                            <div class="relative h-48 overflow-hidden">
                                <img src="${dish.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80'}"
                                     alt="${dish.name}" class="w-full h-full object-cover transition-transform duration-500 hover:scale-110">
                                ${dish.featured ? '<span class="absolute top-3 right-3 bg-gold-500 text-white text-xs font-bold px-3 py-1 rounded-full shadow">★ Destaque</span>' : ''}
                            </div>
                            <div class="p-5 flex-1 flex flex-col">
                                <span class="text-forest-500 text-xs font-medium uppercase tracking-wider">${dish.category?.name || ''}</span>
                                <h3 class="font-display text-xl font-bold text-charcoal-900 mt-1">${dish.name}</h3>
                                <p class="text-charcoal-800/50 text-sm mt-2 flex-1">${dish.description || ''}</p>
                                <div class="space-y-3 mt-4 pt-4 border-t border-gold-400/10">
                                    <div class="flex items-center justify-between">
                                        <span class="text-forest-600 font-bold text-xl font-display">${formatPrice(dish.price)}</span>
                                    </div>
                                    <div class="grid grid-cols-2 gap-2">
                                        <button data-action="quick" data-id="${dish.id}" data-name="${dish.name}" data-image="${dish.image || ''}" data-price="${dish.price}" class="order-btn text-xs bg-green-600 hover:bg-green-700 text-white px-3 py-2.5 rounded-xl transition flex items-center justify-center gap-1 font-medium">
                                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
                                            Pedir Agora
                                        </button>
                                        <button data-action="cart" data-id="${dish.id}" data-name="${dish.name}" data-image="${dish.image || ''}" data-price="${dish.price}" class="order-btn text-xs bg-forest-500 hover:bg-forest-600 text-white px-3 py-2.5 rounded-xl transition flex items-center justify-center gap-1 font-medium">
                                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                                            Adicionar
                                        </button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    `).join('')}
                </div>
            `;
        }

        function quickOrder(id, name, image, price) {
            const dish = { id, name, image, price };
            window.orderModal.openQuickOrder(dish);
        }// Sprint 1 - S1-T1: Use novo toast system
            if (window.feedback && window.feedback.success) {
                window.feedback.success('Adicionado ao carrinho! 🛒');
                return;
            }

            // Fallback para toast legado
            

        function addToCart(id, name, image, price) {
            const dish = { id, name, image, price };
            window.cart.add(dish);

            const toast = document.createElement('div');
            toast.className = 'fixed top-24 right-4 z-[9999] bg-forest-600 text-white px-6 py-4 rounded-xl shadow-2xl font-medium transform transition-all flex items-center gap-3';
            const svgNS = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('class', 'w-6 h-6'); svg.setAttribute('fill', 'none'); svg.setAttribute('stroke', 'currentColor'); svg.setAttribute('viewBox', '0 0 24 24');
            const path = document.createElementNS(svgNS, 'path');
            path.setAttribute('stroke-linecap', 'round'); path.setAttribute('stroke-linejoin', 'round'); path.setAttribute('stroke-width', '2'); path.setAttribute('d', 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z');
            svg.appendChild(path);
            const textDiv = document.createElement('div');
            const titleDiv = document.createElement('div'); titleDiv.className = 'font-bold'; titleDiv.textContent = 'Adicionado ao carrinho!';
            const subtitleDiv = document.createElement('div'); subtitleDiv.className = 'text-sm opacity-80'; subtitleDiv.textContent = 'Clique no botão laranja no canto inferior direito';
            textDiv.appendChild(titleDiv); textDiv.appendChild(subtitleDiv);
            toast.appendChild(svg); toast.appendChild(textDiv);
            document.body.appendChild(toast);
            setTimeout(() => { toast.style.opacity = '0'; toast.style.transform = 'translateY(-20px)'; setTimeout(() => toast.remove(), 300); }, 3500);
        }

        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.order-btn');
            if (!btn) return;
            const action = btn.dataset.action;
            const id = btn.dataset.id;
            const name = btn.dataset.name;
            const image = btn.dataset.image;
            const price = Number(btn.dataset.price);
            if (action === 'quick') quickOrder(id, name, image, price);
            else if (action === 'cart') addToCart(id, name, image, price);
        });

        document.addEventListener('DOMContentLoaded', loadMenu);
    </script>
</body>
