<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria — Sabor & Arte</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600;700&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: { 50: '#FFFDF7', 100: '#FFF9E8', 200: '#FFF3D1' },
                        forest: { 400: '#5B8C5A', 500: '#3D6B3D', 600: '#2D5A2D', 700: '#1E4620' },
                        gold: { 300: '#E8C872', 400: '#D4A843', 500: '#C49A2C' },
                        charcoal: { 800: '#2A2A2A', 900: '#1A1A1A' },
                    }, fontFamily: { display: ['Cormorant Garamond', 'serif'], body: ['Outfit', 'sans-serif'] }
                }
            }
        };
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #FFFDF7;
            color: #2A2A2A;
        }

        .font-display {
            font-family: 'Cormorant Garamond', serif;
        }

        .nav-warm {
            backdrop-filter: blur(16px);
            background: rgba(255, 253, 247, 0.92);
            border-bottom: 1px solid rgba(212, 168, 67, 0.15);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 999;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
            transition: transform 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        .gallery-item {
            cursor: pointer;
            overflow: hidden;
            border-radius: 1rem;
        }

        .gallery-item img {
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 0.75rem;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            cursor: pointer;
            z-index: 10000;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            cursor: pointer;
            padding: 16px;
            font-size: 2rem;
        }

        .lightbox-prev {
            left: 16px;
        }

        .lightbox-next {
            right: 16px;
        }

        .gold-line {
            width: 60px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #D4A843, transparent);
            margin: 0 auto;
        }

        .separator {
            display: flex;
            align-items: center;
            gap: 16px;
            justify-content: center;
        }

        .separator::before,
        .separator::after {
            content: '';
            width: 40px;
            height: 1px;
            background: #D4A843;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="nav-warm fixed top-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a href="/" class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-forest-500 flex items-center justify-center shadow-md">
                        <span class="text-cream-50 text-lg font-display font-bold">S</span>
                    </div>
                    <span class="font-display text-xl md:text-2xl font-bold text-charcoal-900" id="nav-brand">Sabor &
                        Arte</span>
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a href="/" class="text-charcoal-800/60 hover:text-forest-500 transition text-sm">Início</a>
                    <a href="/menu" class="text-charcoal-800/60 hover:text-forest-500 transition text-sm">Cardápio</a>
                    <a href="/gallery" class="text-forest-600 font-medium text-sm">Galeria</a>
                    <a href="/about" class="text-charcoal-800/60 hover:text-forest-500 transition text-sm">Sobre</a>
                    <a href="/contact" class="text-charcoal-800/60 hover:text-forest-500 transition text-sm">Contato</a>
                </div>
                <button id="menu-toggle" class="md:hidden text-charcoal-900 p-2"><svg class="w-6 h-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-cream-50/95 backdrop-blur border-t border-gold-400/10">
            <div class="px-4 py-4 space-y-3">
                <a href="/" class="block text-charcoal-800/60 py-2">Início</a>
                <a href="/menu" class="block text-charcoal-800/60 py-2">Cardápio</a>
                <a href="/gallery" class="block text-forest-600 font-medium py-2">Galeria</a>
                <a href="/about" class="block text-charcoal-800/60 py-2">Sobre</a>
                <a href="/contact" class="block text-charcoal-800/60 py-2">Contato</a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="pt-32 pb-16 bg-cream-50">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <div class="separator mb-4"><span
                    class="text-gold-500 text-xs tracking-[0.3em] uppercase font-medium">Galeria</span></div>
            <h1 class="font-display text-4xl md:text-6xl font-bold text-charcoal-900 mb-4">Nossos Momentos</h1>
            <p class="text-charcoal-800/50 text-lg max-w-2xl mx-auto">Cada imagem conta a história do nosso cuidado com
                cada detalhe.</p>
            <div class="gold-line mt-6"></div>
        </div>
    </section>

    <!-- GALLERY GRID -->
    <section class="pb-20 bg-cream-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="gallery-grid">
                <div class="text-center py-20 col-span-full text-charcoal-800/40">Carregando galeria...</div>
            </div>
        </div>
    </section>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()" aria-label="Fechar">
            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <button class="lightbox-nav lightbox-prev" onclick="prevImage()" aria-label="Anterior">‹</button>
        <img id="lightbox-img" src="" alt="">
        <button class="lightbox-nav lightbox-next" onclick="nextImage()" aria-label="Próximo">›</button>
    </div>

    <!-- FOOTER -->
    <footer class="bg-charcoal-900 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-white/30 text-sm" id="footer-copy">© 2026 Sabor & Arte</p>
        </div>
    </footer>

    <!-- WHATSAPP -->
    <a href="#" id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
        </svg>
    </a>

    <script src="/js/feedback.js"></script>
    <script src="/js/formValidation.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/whatsappFormatter.js"></script>
    <script src="/js/orderModal.js"></script>
    <script src="/js/cartUI.js"></script>
    <script>
        let galleryImages = [];
        let currentIndex = 0;

        const fallbackImages = [
            { src: 'https://images.unsplash.com/photo-1414235077428-338989a2e8c0?w=600&q=80', alt: 'Ambiente do restaurante' },
            { src: 'https://images.unsplash.com/photo-1504674900247-0877df9cc836?w=600&q=80', alt: 'Prato gourmet' },
            { src: 'https://images.unsplash.com/photo-1555396273-367ea4eb4db5?w=600&q=80', alt: 'Bar do restaurante' },
            { src: 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600&q=80', alt: 'Salada fresca' },
            { src: 'https://images.unsplash.com/photo-1565299624946-b28f40a0ae38?w=600&q=80', alt: 'Pizza artesanal' },
            { src: 'https://images.unsplash.com/photo-1482049016688-2d3e1b311543?w=600&q=80', alt: 'Sobremesa' },
            { src: 'https://images.unsplash.com/photo-1467003909585-2f8a72700288?w=600&q=80', alt: 'Prato de peixe' },
            { src: 'https://images.unsplash.com/photo-1551218808-94e220e084d2?w=600&q=80', alt: 'Cozinha' },
        ];

        async function loadGallery() {
            const grid = document.getElementById('gallery-grid');
            
            // Sprint 1 - S1-T6: Skeleton loaders
            if (window.feedback && window.feedback.skeletons) {
                grid.innerHTML = window.feedback.skeletons.gallery(8);
            }

            const data = await api('/gallery');
            galleryImages = (data && data.length > 0) ? data : fallbackImages;

            grid.innerHTML = galleryImages.map((img, i) => `
                <div class="gallery-item aspect-square shadow-sm border border-gold-400/10" onclick="openLightbox(${i})">
                    <img src="${img.src}" alt="${img.alt || ''}" class="w-full h-full object-cover" loading="lazy">
                </div>
            `).join('');
        }

        function openLightbox(index) {
            currentIndex = index;
            const lightbox = document.getElementById('lightbox');
            
            // Sprint 1 - S1-T5: ARIA attributes
            lightbox.setAttribute('role', 'dialog');
            lightbox.setAttribute('aria-modal', 'true');
            lightbox.setAttribute('aria-label', 'Visualização de imagem');
            
            document.getElementById('lightbox-img').src = galleryImages[index].src;
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';

            // Sprint 1 - S1-T5: Focus close button
            setTimeout(() => {
                const closeBtn = lightbox.querySelector('[onclick="closeLightbox()"]');
                if (closeBtn) closeBtn.focus();
            }, 100);
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        func
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();

            // Sprint 1 - S1-T5: Tab focus trap
            if (e.key === 'Tab') {
                const focusable = lb.querySelectorAll('button:not([disabled])');
                const focusableArray = Array.from(focusable);
                if (focusableArray.length === 0) return;

                const firstElement = focusableArray[0];
                const lastElement = focusableArray[focusableArray.length - 1];

                if (e.shiftKey && document.activeElement === firstElement) {
                    e.preventDefault();
                    lastElement.focus();
                } else if (!e.shiftKey && document.activeElement === lastElement) {
                    e.preventDefault();
                    firstElement.focus();
                }
            }.src = galleryImages[currentIndex].src;
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
            document.getElementById('lightbox-img').src = galleryImages[currentIndex].src;
        }

        document.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            if (!lb.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>

</html>
