<!DOCTYPE html>
<html lang="pt-BR">

<head>

    /* Safe area inset for cart button */

  </style>

      href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;600;700&family=Quicksand:wght@400;500;600;700&display=swap">

  <script id="seo-jsonld" type="application/ld+json">{}</script>
  <style>
    :root {
      --brand: #DC2626;
      --brand-dark: #B91C1C;
      --accent: #CA8A04;
      --bg: #FFFBF5;
      --surface: #FEF9F0;
      --text: #450A0A;
      --muted: #92400E;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Quicksand', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h1,
    h2,
    h3 {
      font-family: 'Caveat', cursive;
    }

    a {
      text-decoration: none;
    }

    .topnav {
      background: #fff;
      border-bottom: 2px solid #FCA5A5;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 1px 4px rgba(220, 38, 38, .08);
    }

    .topnav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .topnav-brand {
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--brand);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .logo-icon svg {
      width: 20px;
      height: 20px;
      color: #fff;
    }

    #nav-brand {
      font-family: 'Caveat', cursive;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--brand);
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      font-size: .875rem;
      font-weight: 600;
      color: var(--muted);
      transition: color .2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--brand);
    }

    .nav-ham {
      display: none;
      background: none;
      border: none;
      padding: .25rem;
      cursor: pointer;
      color: var(--brand);
    }

    #mobile-nav {
      display: none;
      background: #fff;
      border-top: 1px solid #FCA5A5;
    }

    #mobile-nav a {
      display: block;
      padding: .75rem 1rem;
      font-weight: 600;
      color: var(--muted);
      font-size: .95rem;
    }

    #mobile-nav a:hover,
    #mobile-nav a.active {
      color: var(--brand);
    }

    @media(max-width:640px) {
      .nav-links {
        display: none;
      }

      .nav-ham {
        display: block;
      }
    }

    /* Page header */
    .page-header {
      background: #FEF2F2;
      border-bottom: 1.5px solid #FCA5A5;
      padding: 1.5rem 1rem;
    }

    .page-header-inner {
      max-width: 900px;
      margin: 0 auto;
    }

    .page-header h1 {
      font-family: 'Caveat', cursive;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
    }

    .page-header p {
      font-size: .85rem;
      color: var(--muted);
      margin-top: .2rem;
    }

    /* Cart bar */
    #cart-bar {
      position: sticky;
      top: 56px;
      z-index: 40;
      background: #fff;
      border-bottom: 1.5px solid #FCA5A5;
      padding: .5rem 1rem;
      display: none;
    }

    #cart-bar.visible {
      display: block;
    }

    #cart-bar-inner {
      max-width: 900px;
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: .5rem;
    }

    #cart-bar-summary {
      font-size: .85rem;
      font-weight: 600;
      color: var(--muted);
    }

    #cart-bar-total {
      font-weight: 700;
      color: var(--brand);
    }

    .btn-cart-confirm {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 999px;
      padding: .45rem 1.1rem;
      font-size: .85rem;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }

    .btn-cart-confirm:hover {
      background: var(--brand-dark);
    }

    /* Search */
    .search-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: .75rem 1rem;
    }

    .search-input {
      width: 100%;
      padding: .6rem 1rem;
      border: 1.5px solid #FCA5A5;
      border-radius: 999px;
      font-size: .9rem;
      font-family: 'Quicksand', sans-serif;
      color: var(--text);
      outline: none;
      transition: border .2s;
    }

    .search-input:focus {
      border-color: var(--brand);
    }

    /* Category tabs */
    #category-tabs {
      max-width: 900px;
      margin: 0 auto;
      padding: .4rem 1rem .8rem;
      display: flex;
      gap: .5rem;
      overflow-x: auto;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    #category-tabs::-webkit-scrollbar {
      display: none;
    }

    .cat-tab {
      flex-shrink: 0;
      background: #fff;
      border: 1.5px solid #FCA5A5;
      color: var(--brand);
      font-size: .8rem;
      font-weight: 600;
      padding: .3rem .9rem;
      border-radius: 999px;
      cursor: pointer;
      transition: all .2s;
    }

    .cat-tab:hover,
    .cat-tab.active {
      background: var(--brand);
      color: #fff;
      border-color: var(--brand);
    }

    /* Menu */
    .menu-section {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem 2.5rem;
    }

    #menu-container {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 1rem;
    }

    .dish-card {
      background: #fff;
      border: 1.5px solid #FCA5A5;
      border-radius: 16px;
      overflow: hidden;
      transition: transform .2s, box-shadow .2s;
    }

    .dish-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 20px rgba(220, 38, 38, .12);
    }

    .dish-img {
      width: 100%;
      height: 170px;
      object-fit: cover;
      background: #FEF2F2;
    }

    .dish-img-placeholder {
      width: 100%;
      height: 170px;
      background: #FEF2F2;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.5rem;
    }

    .dish-body {
      padding: .75rem;
    }

    .dish-name {
      font-family: 'Caveat', cursive;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--text);
      margin-bottom: .2rem;
      line-height: 1.2;
    }

    .dish-desc {
      font-size: .72rem;
      color: var(--muted);
      margin-bottom: .5rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .dish-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .dish-price {
      font-weight: 700;
      font-size: .95rem;
      color: var(--brand);
    }

    .add-btn {
      background: var(--brand);
      color: #fff;
      border: none;
      border-radius: 999px;
      width: 36px;
      height: 36px;
      font-size: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background .2s;
    }

    .add-btn:hover {
      background: var(--brand-dark);
    }

    .dish-unavailable {
      opacity: .55;
    }

    .no-dishes {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--muted);
      font-size: .9rem;
    }

    /* Footer */
    footer {
      background: #FEF2F2;
      border-top: 2px solid #FCA5A5;
      padding: 2rem 1rem;
      text-align: center;
    }

    .footer-inner {
      max-width: 900px;
      margin: 0 auto;
    }

    #footer-brand {
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--brand);
      display: block;
      margin-bottom: .25rem;
    }

    #footer-tagline {
      font-size: .8rem;
      color: var(--muted);
      display: block;
      margin-bottom: .5rem;
    }

    #footer-copy {
      font-size: .72rem;
      color: #B0837A;
      margin-top: .5rem;
      display: block;
    }

    .footer-links a {
      font-size: .72rem;
      color: var(--muted);
      margin: 0 .5rem;
    }

    .footer-links a:hover {
      color: var(--brand);
    }

    /* WA float */
    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 999;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #25D366;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 14px rgba(37, 211, 102, .45);
      transition: transform .2s;
    }

    .whatsapp-float:hover {
      transform: scale(1.1);
    }

    /* Loader */
    #global-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity .4s, visibility .4s;
    }

    #global-loader .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #FCA5A5;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    body:not(.config-loaded) #global-loader {
      opacity: 1;
      visibility: visible;
    }

    body.config-loaded #global-loader {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    body:not(.config-loaded) {
      overflow: hidden;
    }

    /* Store closed */
    #store-status-banner {
      display: none;
      background: #FEF2F2;
      border-bottom: 1px solid #FCA5A5;
      padding: .4rem 1rem;
      text-align: center;
      font-size: .8rem;
      font-weight: 600;
      color: #B91C1C;
    }

    #store-status-banner.closed {
      display: block;
    }

    /* Shared JS modal/cart dark-theme compat */
    .bg-dark-700 {
      background-color: #334155
    }

    .bg-dark-800 {
      background-color: #1e293b
    }

    .bg-dark-900 {
      background-color: #0f172a
    }

    .bg-dark-800\/60 {
      background-color: rgba(30, 41, 59, .6)
    }

    .bg-brand-500 {
      background-color: var(--brand)
    }

    .bg-brand-600 {
      background-color: var(--brand-dark)
    }

    .hover\:bg-brand-600:hover {
      background-color: var(--brand-dark)
    }

    .hover\:bg-dark-900:hover {
      background-color: #0f172a
    }

    .text-brand-400 {
      color: var(--brand)
    }

    .focus\:border-brand-400:focus {
      border-color: var(--brand)
    }

    .border-white\/10 {
      border-color: rgba(255, 255, 255, .1)
    }

    .border-white\/5 {
      border-color: rgba(255, 255, 255, .05)
    }

    @media(prefers-reduced-motion:reduce) {

      *,
      ::before,
      ::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

<body>

  <div id="store-status-banner">Estamos fechados no momento. Pedidos podem ser feitos pelo WhatsApp.</div>

  <nav class="topnav" role="navigation" aria-label="Menu principal">

  <script defer src="/js/mobile.js"></script>

  <script>
    // Mobile nav
    document.getElementById('nav-ham-btn').addEventListener('click', function () {
      const mn = document.getElementById('mobile-nav');
      const expanded = this.getAttribute('aria-expanded') === 'true';
      mn.style.display = expanded ? 'none' : 'block';
      this.setAttribute('aria-expanded', String(!expanded));
    });
    // Store status
    window.applyStoreStatus = function (open) {
      const b = document.getElementById('store-status-banner');
      if (b) b.classList.toggle('closed', !open);
    };
    // Search
    const searchInput = document.getElementById('menu-search');
    if (searchInput) {
      searchInput.addEventListener('input', function () {
        const q = this.value.toLowerCase().trim();
        document.querySelectorAll('#menu-container .dish-card').forEach(card => {
          const name = (card.querySelector('.dish-name') || {}).textContent || '';
          const desc = (card.querySelector('.dish-desc') || {}).textContent || '';
          card.style.display = (name.toLowerCase().includes(q) || desc.toLowerCase().includes(q)) ? '' : 'none';
        });
      });
    }

    // --- Menu Page Logic ---
    let allCategories = [];
    let allDishes = [];
    let activeCategory = 'all';

    function escapeHTML(value) {
      const div = document.createElement('div');
      div.textContent = value ?? '';
      return div.innerHTML;
    }

    function escapeAttr(value) {
      return escapeHTML(value).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    async function loadMenu() {
      const menuContainer = document.getElementById('menu-container');
      const tabsContainer = document.getElementById('category-tabs');
      if (!menuContainer || !tabsContainer) return;
      menuContainer.innerHTML = '<p class="no-dishes">Carregando card\u00e1pio...</p>';
      const categories = await window.api('/categories');
      if (!categories || categories.length === 0) {
        menuContainer.innerHTML = '<p class="no-dishes">Nenhum prato dispon\u00edvel no momento.</p>';
        return;
      }
      allCategories = categories;
      allDishes = categories.flatMap(cat =>
        cat.dishes.map(d => ({ ...d, category: { id: cat.id, name: cat.name, slug: cat.slug } }))
      );
      tabsContainer.textContent = '';
      const allBtn = document.createElement('button');
      allBtn.className = 'cat-tab active';
      allBtn.dataset.category = 'all';
      allBtn.textContent = 'Todos';
      allBtn.setAttribute('role', 'tab');
      allBtn.setAttribute('aria-selected', 'true');
      allBtn.addEventListener('click', () => filterCategory('all'));
      tabsContainer.appendChild(allBtn);
      categories.forEach(cat => {
        const btn = document.createElement('button');
        btn.className = 'cat-tab';
        btn.dataset.category = cat.slug || '';
        btn.textContent = cat.name || '';
        btn.setAttribute('role', 'tab');
        btn.setAttribute('aria-selected', 'false');
        btn.addEventListener('click', () => filterCategory(cat.slug || 'all'));
        tabsContainer.appendChild(btn);
      });
      renderDishes(allDishes);
      if (window.location.hash) {
        filterCategory(window.location.hash.slice(1));
      }
    }

    function filterCategory(slug) {
      activeCategory = slug;
      document.querySelectorAll('.cat-tab').forEach(tab => {
        const isActive = tab.dataset.category === slug;
        tab.classList.toggle('active', isActive);
        tab.setAttribute('aria-selected', String(isActive));
      });
      const filtered = slug === 'all'
        ? allDishes
        : allDishes.filter(d => d.category.slug === slug);
      renderDishes(filtered);
    }

    function renderDishes(dishes) {
      const container = document.getElementById('menu-container');
      if (dishes.length === 0) {
        container.innerHTML = '<p class="no-dishes">Nenhum prato encontrado.</p>';
        return;
      }
      const isClosed = window.isStoreCurrentlyOpen === false;
      container.innerHTML = dishes.map(dish => {
        const imgHtml = dish.image
          ? `<img src="${escapeAttr(dish.image)}" alt="${escapeAttr(dish.name)}" class="dish-img" loading="lazy">`
          : `<div class="dish-img-placeholder" aria-hidden="true">\uD83C\uDF7D\uFE0F</div>`;
        const disabledAttr = isClosed ? ' disabled' : '';
        const unavailableClass = isClosed ? ' dish-unavailable' : '';
        return `<div class="dish-card${unavailableClass}" role="listitem">
          ${imgHtml}
          <div class="dish-body">
            <div class="dish-name">${escapeHTML(dish.name)}</div>
            <div class="dish-desc">${escapeHTML(dish.description || '')}</div>
            <div class="dish-footer">
              <span class="dish-price">${window.formatPrice(dish.price)}</span>
              <button${disabledAttr} class="add-btn order-btn" data-action="cart"
                data-id="${escapeAttr(String(dish.id))}" data-name="${escapeAttr(dish.name)}"
                data-image="${escapeAttr(dish.image || '')}" data-price="${dish.price}"
                aria-label="Adicionar ${escapeAttr(dish.name)} ao carrinho">+</button>
            </div>
          </div>
        </div>`;
      }).join('');
    }

    document.addEventListener('click', function (e) {
      const btn = e.target.closest('.order-btn');
      if (!btn) return;
      const id = btn.dataset.id;
      const name = btn.dataset.name;
      const image = btn.dataset.image;
      const price = Number(btn.dataset.price);
      if (window.cart) {
        window.cart.add({ id, name, image, price });
        if (window.feedback) window.feedback.success('Adicionado ao carrinho! \uD83D\uDED2');
      }
    });

    document.addEventListener('DOMContentLoaded', loadMenu);
  </script>
</body>

</html>
