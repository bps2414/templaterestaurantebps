    <meta property="og:title" content="Galeria — Chocobites">
    <meta property="og:description" content="Galeria de fotos — Conheça nossos doces artesanais.">

    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Josefin+Sans:wght@300;400;700&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 50: '#fdf9f0', 100: '#faf0d8', 200: '#f5dfb0', 300: '#efca7f', 400: '#D4AF37', 500: '#C68642', 600: '#A0652D', 700: '#7a4a1e', 800: '#5D3A1A', 900: '#3B1F0A' }, dark: { 800: '#5D3A1A', 900: '#3B1F0A' }, cream: '#FFF8DC', beige: '#FDF4E3', 'beige-gold': '#E8C99A', 'off-white': '#FAF7F2' }, fontFamily: { display: ['Fredoka One', 'cursive'], body: ['Josefin Sans', 'sans-serif'] } } } };
    </script>
    <style>
        body {
            font-family: 'Josefin Sans', sans-serif;
            background: #FAF7F2;
            color: #3B1F0A
        }

        .font-display {
            font-family: 'Fredoka One', cursive
        }

        .nav-glass {
            backdrop-filter: blur(12px);
            background: rgba(59, 31, 10, 0.95)
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 999;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
            transition: transform .3s;
            animation: pulse-green 2s infinite
        }

        .whatsapp-float:hover {
            transform: scale(1.1)
        }

        @keyframes pulse-green {
            0% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0.7)
            }

            70% {
                box-shadow: 0 0 0 15px rgba(37, 211, 102, 0)
            }

            100% {
                box-shadow: 0 0 0 0 rgba(37, 211, 102, 0)
            }
        }

        .gallery-item {
            cursor: pointer;
            overflow: hidden;
            border-radius: .75rem
        }

        .gallery-item img {
            transition: transform .5s ease
        }

        .gallery-item:hover img {
            transform: scale(1.1)
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(59, 31, 10, 0.95);
            align-items: center;
            justify-content: center
        }

        .lightbox.active {
            display: flex
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: .75rem
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #FFF8DC;
            cursor: pointer;
            z-index: 10000
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: #FFF8DC;
            cursor: pointer;
            padding: 16px;
            font-size: 2rem
        }

        .lightbox-prev {
            left: 16px
        }

        .lightbox-next {
            right: 16px
        }

        body:not(.config-loaded) #nav-brand,
        body:not(.config-loaded) #footer-copy,
        body:not(.config-loaded) .pt-32 {
            opacity: 0;
            transition: opacity .3s ease
        }

        body.config-loaded #nav-brand,
        body.config-loaded #footer-copy,
        body.config-loaded .pt-32 {
            opacity: 1
        }
    </style>
</head>

<body>
    <a data-nav="true" href="#main-content"
        class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 focus:z-[100] focus:p-4 focus:bg-beige-gold focus:text-dark-900 font-bold">Pular
        para o conteúdo principal (skip)</a>

    <!-- NAVBAR -->
    <nav class="nav-glass fixed top-0 w-full z-50 border-b border-beige-gold/20">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a data-nav="true" href="/" class="flex items-center gap-3">
                    <svg class="w-6 h-6 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 8.25v-1.5m0 1.5c-1.355 0-2.697.056-4.024.166C6.845 8.51 6 9.473 6 10.608v2.513m6-4.871c1.355 0 2.697.056 4.024.166C17.155 8.51 18 9.473 18 10.608v2.513M15 8.25v-1.5m-6 1.5v-1.5m12 9.75l-1.5.75a3.354 3.354 0 01-3 0 3.354 3.354 0 00-3 0 3.354 3.354 0 01-3 0 3.354 3.354 0 00-3 0 3.354 3.354 0 01-3 0L3 16.5m15-3.379a48.474 48.474 0 00-6-.371c-2.032 0-4.034.126-6 .371m12 0c.39.049.777.102 1.163.16 1.07.16 1.837 1.094 1.837 2.175v5.169c0 .621-.504 1.125-1.125 1.125H4.125A1.125 1.125 0 013 20.625v-5.17c0-1.08.768-2.014 1.837-2.174A47.78 47.78 0 016 13.12M16.5 3.75V16.5" />
                    </svg>
                    <span class="font-display text-xl md:text-2xl font-bold text-cream" id="nav-brand"></span>
                </a>
                <div class="hidden md:flex items-center gap-6">
                    <a data-nav="true" href="/" class="text-beige-gold hover:text-cream transition text-sm">Início</a>
                    <a data-nav="true" href="/menu" class="text-beige-gold hover:text-cream transition text-sm">Produtos</a>
                    <a data-nav="true" href="/gallery" class="text-cream font-medium text-sm">Galeria</a>
                    <a data-nav="true" href="/about" class="text-beige-gold hover:text-cream transition text-sm">Sobre</a>
                    <a data-nav="true" href="/contact" class="text-beige-gold hover:text-cream transition text-sm">Contato</a>
                </div>
                <button id="menu-toggle" class="md:hidden text-cream p-2"><svg class="w-6 h-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-dark-900/95 backdrop-blur border-t border-beige-gold/20">
            <div class="px-4 py-4 space-y-3">
                <a data-nav="true" href="/" class="block text-beige-gold py-2">Início</a>
                <a data-nav="true" href="/menu" class="block text-beige-gold py-2">Produtos</a>
                <a data-nav="true" href="/gallery" class="block text-cream font-medium py-2">Galeria</a>
                <a data-nav="true" href="/about" class="block text-beige-gold py-2">Sobre</a>
                <a data-nav="true" href="/contact" class="block text-beige-gold py-2">Contato</a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <main id="main-content" aria-label="Main Content">
        <section class="pt-32 pb-16 bg-dark-900">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-brand-500 font-medium tracking-widest uppercase text-sm mb-3">Galeria</p>
                <h1 class="font-display text-4xl md:text-6xl text-cream mb-4">Nossos Momentos 📸</h1>
                <p class="text-beige-gold text-lg max-w-2xl mx-auto font-light">Cada imagem conta a história do nosso
                    cuidado com cada detalhe.</p>
            </div>
        </section>

        <!-- GALLERY GRID -->
        <section class="pb-20 bg-off-white">
            <div class="max-w-7xl mx-auto px-4 pt-12">
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="gallery-grid"></div>
            </div>
        </section>
    </main>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()"
            onkeydown="if(event.key==='Enter' || event.key===' ') closeLightbox()" aria-label="Fechar"><svg
                class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg></button>
        <button class="lightbox-nav lightbox-prev" onclick="prevImage()"
            onkeydown="if(event.key==='Enter' || event.key===' ') prevImage()" aria-label="Anterior">‹</button>
        <img id="lightbox-img" src="" alt="">
        <button class="lightbox-nav lightbox-next" onclick="nextImage()"
            onkeydown="if(event.key==='Enter' || event.key===' ') nextImage()" aria-label="Próximo">›</button>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark-900 border-t border-beige-gold/20 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-beige-gold/60 text-sm" id="footer-copy"></p>
            <a data-nav="true" href="/privacy"
                class="text-beige-gold/60 hover:text-brand-400 text-xs mt-2 inline-block transition">Política de
                Privacidade</a>
        </div>
    </footer>

    <a data-nav="true" href="#" id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
        </svg>
    </a>

    <script src="/js/performance.js"></script>
    <script src="/js/mobile.js"></script>
    <script src="/js/a11y.js"></script>
    <script src="/js/feedback.js"></script>
    <script src="/js/formValidation.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/whatsappFormatter.js"></script>
    <script src="/js/orderModal.js"></script>
    <script src="/js/cartUI.js"></script>
    <script>
        let galleryImages = []; let currentIndex = 0;
        function escapeHTMLGallery(v) { const d = document.createElement('div'); d.textContent = v ?? ''; return d.innerHTML }
        function escapeAttrGallery(v) { return escapeHTMLGallery(v).replace(/"/g, '&quot;').replace(/'/g, '&#39;') }
        async function loadGallery() {
            var grid = document.getElementById('gallery-grid');
            if (window.feedback && window.feedback.skeletons) grid.innerHTML = window.feedback.skeletons.gallery(8);
            const data = await api('/gallery');
            if (!data || data.length === 0) { grid.innerHTML = '<div class="text-center py-20 col-span-full text-dark-800/50">Nenhuma imagem na galeria ainda.</div>'; return }
            galleryImages = data; grid.textContent = '';
            galleryImages.forEach(function (img, i) {
                var item = document.createElement('div'); item.className = 'gallery-item aspect-square shadow-sm'; item.dataset.index = i;
                var image = document.createElement('img'); image.src = img.src; image.alt = img.alt || ''; image.className = 'w-full h-full object-cover'; image.loading = 'lazy';
                item.appendChild(image); item.addEventListener('click', function () { openLightbox(i) }); grid.appendChild(item);
            });
        }
        function openLightbox(i) { currentIndex = i; var lbImg = document.getElementById('lightbox-img'); lbImg.src = galleryImages[i].src; lbImg.alt = galleryImages[i].alt || ''; var lb = document.getElementById('lightbox'); lb.classList.add('active'); lb.setAttribute('role', 'dialog'); lb.setAttribute('aria-modal', 'true'); document.body.style.overflow = 'hidden'; var c = lb.querySelector('.lightbox-close'); if (c) setTimeout(function () { c.focus() }, 100) }
        function closeLightbox() { var lb = document.getElementById('lightbox'); lb.classList.remove('active'); lb.removeAttribute('aria-modal'); document.body.style.overflow = '' }
        function nextImage() { currentIndex = (currentIndex + 1) % galleryImages.length; var lbImg = document.getElementById('lightbox-img'); lbImg.src = galleryImages[currentIndex].src; lbImg.alt = galleryImages[currentIndex].alt || '' }
        function prevImage() { currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length; var lbImg = document.getElementById('lightbox-img'); lbImg.src = galleryImages[currentIndex].src; lbImg.alt = galleryImages[currentIndex].alt || '' }
        document.addEventListener('keydown', function (e) { var lb = document.getElementById('lightbox'); if (!lb.classList.contains('active')) return; if (e.key === 'Escape') closeLightbox(); if (e.key === 'ArrowRight') nextImage(); if (e.key === 'ArrowLeft') prevImage(); if (e.key === 'Tab') { var els = Array.from(lb.querySelectorAll('button:not([disabled])')); if (!els.length) return; if (e.shiftKey && document.activeElement === els[0]) { e.preventDefault(); els[els.length - 1].focus() } else if (!e.shiftKey && document.activeElement === els[els.length - 1]) { e.preventDefault(); els[0].focus() } } });
        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>

</html>
