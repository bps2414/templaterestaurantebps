<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria — Pizzaria</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="page-name" content="Galeria">
    <meta name="description" content="Veja nossas pizzas artesanais, o ambiente e os bastidores da nossa cozinha.">
    <link rel="canonical" href="">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:title" content="Galeria — Pizzaria">
    <meta property="og:description" content="Confira fotos das nossas pizzas artesanais feitas no forno a lenha.">
    <link rel="preconnect" href="https://res.cloudinary.com">
    <link rel="dns-prefetch" href="https://res.cloudinary.com">
    <link rel="stylesheet" href="/css/styles.css">
<link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display+SC:wght@400;700&family=Karla:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Karla', sans-serif;
            background: #0c0a09;
            color: #f5f5f5;
        }

        .font-display {
            font-family: 'Playfair Display SC', serif;
        }

        .nav-glass {
            backdrop-filter: blur(12px);
            background: rgba(12, 10, 9, 0.8);
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 999;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
            transition: transform 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        body:not(.config-loaded) #nav-brand,
        body:not(.config-loaded) #footer-copy,
        body:not(.config-loaded) #main-content {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        body.config-loaded #nav-brand,
        body.config-loaded #footer-copy,
        body.config-loaded #main-content {
            opacity: 1;
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 1000;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 12px;
        }
    
        /* Global Loader */
        body:not(.config-loaded) { overflow: hidden; }
        body:not(.config-loaded) #global-loader { opacity: 1; visibility: visible; }
        body.config-loaded #global-loader { opacity: 0; visibility: hidden; pointer-events: none; }
    </style>
</head>

<body>
    <!-- Global Loader (prevent FOUC) -->
    <div id="global-loader" class="fixed inset-0 z-[99999] flex items-center justify-center bg-dark-900 transition-all duration-800">
        <div class="w-12 h-12 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
    <a data-nav="true" href="#main-content"
        class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 focus:z-[100] focus:p-4 focus:bg-brand-500 focus:text-white">Pular
        para o conteúdo principal</a>

    <!-- NAVBAR -->
    <nav class="nav-glass fixed top-0 w-full z-50 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a data-nav="true" href="/" class="flex items-center gap-3">
                    <svg class="w-6 h-6 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M15 11h.01"></path>
                            <path d="M11 15h.01"></path>
                            <path d="M16 16h.01"></path>
                            <path d="m2 16 20 6-6-20A20 20 0 0 0 2 16"></path>
                            <path d="M5.71 17.11a17.04 17.04 0 0 1 11.4-11.4"></path>
                        </svg>
                    <span class="font-display text-xl md:text-2xl font-bold text-white" id="nav-brand"></span>
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a data-nav="true" href="/" class="text-gray-300 hover:text-brand-400 transition text-sm">Início</a>
                    <a data-nav="true" href="/menu"
                        class="text-gray-300 hover:text-brand-400 transition text-sm">Cardápio</a>
                    <a data-nav="true" href="/gallery" class="text-brand-400 font-medium text-sm">Galeria</a>
                    <a data-nav="true" href="/about"
                        class="text-gray-300 hover:text-brand-400 transition text-sm">Sobre</a>
                    <a data-nav="true" href="/contact"
                        class="text-gray-300 hover:text-brand-400 transition text-sm">Contato</a>
                </div>
                <button id="menu-toggle" class="md:hidden text-white p-2"><svg class="w-6 h-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-dark-900/95 backdrop-blur border-t border-white/5">
            <div class="px-4 py-4 space-y-3">
                <a data-nav="true" href="/" class="block text-gray-300 py-2">Início</a>
                <a data-nav="true" href="/menu" class="block text-gray-300 py-2">Cardápio</a>
                <a data-nav="true" href="/gallery" class="block text-brand-400 font-medium py-2">Galeria</a>
                <a data-nav="true" href="/about" class="block text-gray-300 py-2">Sobre</a>
                <a data-nav="true" href="/contact" class="block text-gray-300 py-2">Contato</a>
            </div>
        </div>
    </nav>

    <!-- MAIN -->
    <main id="main-content">
        <section class="pt-32 pb-16 bg-dark-900">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-brand-400 font-medium tracking-widest uppercase text-sm mb-3">Galeria</p>
                <h1 class="font-display text-4xl md:text-6xl font-bold text-white mb-4">Nossas Fotos</h1>
                <p class="text-gray-400 text-lg max-w-2xl mx-auto">Confira as imagens das nossas pizzas, do ambiente e
                    dos bastidores.</p>
            </div>
        </section>

        <section class="pb-20 bg-dark-900">
            <div class="max-w-7xl mx-auto px-4">
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4 reveal" id="gallery-grid">
                    <div class="text-center py-20 col-span-4 text-gray-500">Carregando galeria...</div>
                </div>
            </div>
        </section>
    </main>

    <!-- LIGHTBOX -->
    <div id="lightbox" class="lightbox" role="dialog" aria-modal="true" aria-label="Visualizar imagem">
        <button id="lightbox-close"
            class="absolute top-6 right-6 text-white/80 hover:text-white z-10 min-w-[44px] min-h-[44px] flex items-center justify-center"
            aria-label="Fechar">
            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <button id="lightbox-prev"
            class="absolute left-4 top-1/2 -translate-y-1/2 text-white/80 hover:text-white z-10 min-w-[44px] min-h-[44px] flex items-center justify-center"
            aria-label="Anterior">
            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
            </svg>
        </button>
        <button id="lightbox-next"
            class="absolute right-4 top-1/2 -translate-y-1/2 text-white/80 hover:text-white z-10 min-w-[44px] min-h-[44px] flex items-center justify-center"
            aria-label="Próxima">
            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" />
            </svg>
        </button>
        <img id="lightbox-img" src="" alt="Imagem ampliada">
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark-900 border-t border-white/5 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-600 text-sm" id="footer-copy">© 2026 Pizzaria</p>
            <a data-nav="true" href="/privacy"
                class="text-gray-500 hover:text-brand-400 text-xs mt-2 inline-flex items-center justify-center min-h-[44px] py-2 transition">Política
                de Privacidade</a>
        </div>
    </footer>

    <!-- WHATSAPP -->
    <a data-nav="true" href="#" id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
        </svg>
    </a>

    <script defer src="/js/feedback.js"></script>
    <script defer src="/js/formValidation.js"></script>
    <script defer src="/js/app.js"></script>
    <script defer src="/js/cart.js"></script>
    <script defer src="/js/whatsappFormatter.js"></script>
    <script defer src="/js/orderModal.js"></script>
    <script defer src="/js/cartUI.js"></script>
    <script>
        let galleryImages = [];
        let currentIndex = 0;

        function escapeHTMLGallery(val) {
            const d = document.createElement('div');
            d.textContent = val ?? '';
            return d.innerHTML;
        }
        function escapeAttrGallery(val) {
            return escapeHTMLGallery(val).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        async function loadGallery() {
            try {
                const res = await fetch(`${window.location.origin}/api/gallery`);
                const json = await res.json();
                if (!json.success || !json.data || json.data.length === 0) {
                    document.getElementById('gallery-grid').innerHTML = '<p class="text-center py-20 col-span-4 text-gray-500">Nenhuma imagem disponível</p>';
                    return;
                }
                galleryImages = json.data;
                const grid = document.getElementById('gallery-grid');
                grid.innerHTML = galleryImages.map((img, i) => `
                    <div class="cursor-pointer group relative overflow-hidden rounded-xl" onclick="openLightbox(${i})">
                        <img src="${escapeAttrGallery(img.url || img.image_url)}" alt="${escapeAttrGallery(img.alt || img.title || 'Foto da galeria')}"
                            class="w-full h-48 md:h-64 object-cover transition-transform duration-500 group-hover:scale-110"
                            loading="lazy">
                        <div class="absolute inset-0 bg-gradient-to-t from-dark-900/60 to-transparent opacity-0 group-hover:opacity-100 transition-opacity flex items-end p-4">
                            <p class="text-white text-sm font-medium">${escapeHTMLGallery(img.title || '')}</p>
                        </div>
                    </div>
                `).join('');

                if (typeof initReveal === 'function') setTimeout(initReveal, 100);
            } catch (e) {
                console.error('Error loading gallery:', e);
            }
        }

        function openLightbox(index) {
            currentIndex = index;
            const img = galleryImages[currentIndex];
            const lightbox = document.getElementById('lightbox');
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = img.url || img.image_url || '';
            lightboxImg.alt = img.alt || img.title || 'Foto da galeria';
            lightbox.classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function navigateLightbox(dir) {
            currentIndex = (currentIndex + dir + galleryImages.length) % galleryImages.length;
            const img = galleryImages[currentIndex];
            const lightboxImg = document.getElementById('lightbox-img');
            lightboxImg.src = img.url || img.image_url || '';
            lightboxImg.alt = img.alt || img.title || 'Foto da galeria';
        }

        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox-prev').addEventListener('click', () => navigateLightbox(-1));
        document.getElementById('lightbox-next').addEventListener('click', () => navigateLightbox(1));
        document.getElementById('lightbox').addEventListener('click', (e) => { if (e.target.id === 'lightbox') closeLightbox(); });
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('lightbox').classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') navigateLightbox(-1);
            if (e.key === 'ArrowRight') navigateLightbox(1);
        });

        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>

</html>
