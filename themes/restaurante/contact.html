<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="page-name" content="Contato">
    <meta name="description"
        content="Entre em contato — Endereço, telefone, WhatsApp e formulário. Agende sua reserva ou tire suas dúvidas.">
    <link rel="canonical" href="">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:title" content="Contato — Restaurante">
    <meta property="og:description" content="Entre em contato — Endereço, telefone, WhatsApp e formulário.">
    <meta property="og:url" content="">
    <meta property="og:site_name" content="Restaurante">
    <meta property="og:image" content="">
    <!-- Preconnect -->
    <link rel="preconnect" href="https://res.cloudinary.com">
    <link rel="dns-prefetch" href="https://res.cloudinary.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 400: '#f19244', 500: '#ee7620', 600: '#d95c16' }, dark: { 800: '#1a1a2e', 900: '#0f0f1a' } }, fontFamily: { display: ['Playfair Display', 'serif'], body: ['Inter', 'sans-serif'] } } } };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #f5f5f5;
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }

        .nav-glass {
            backdrop-filter: blur(12px);
            background: rgba(15, 15, 26, 0.8);
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-glow {
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(238, 118, 32, 0.4);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 999;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
            transition: transform 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        /* FOUC prevention */
        body:not(.config-loaded) #nav-brand,
        body:not(.config-loaded) #footer-brand,
        body:not(.config-loaded) #footer-tagline,
        body:not(.config-loaded) #footer-copy,
        body:not(.config-loaded) #contact-address,
        body:not(.config-loaded) #contact-phone,
        body:not(.config-loaded) #contact-email,
        body:not(.config-loaded) #contact-hours,
        body:not(.config-loaded) .pt-32 {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        body.config-loaded #nav-brand,
        body.config-loaded #footer-brand,
        body.config-loaded #footer-tagline,
        body.config-loaded #footer-copy,
        body.config-loaded #contact-address,
        body.config-loaded #contact-phone,
        body.config-loaded #contact-email,
        body.config-loaded #contact-hours,
        body.config-loaded .pt-32 {
            opacity: 1;
            animation: configFadeIn 0.3s ease;
        }

        @keyframes configFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <a data-nav="true" href="#main-content"
        class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 focus:z-[100] focus:p-4 focus:bg-brand-500 focus:text-white">Pular
        para o conteúdo principal (skip)</a>

    <!-- NAVBAR -->
    <nav class="nav-glass fixed top-0 w-full z-50 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a data-nav="true" href="/" class="flex items-center gap-3">
                    <svg class="w-6 h-6 text-brand-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 8.25v-1.5m0 1.5c-1.355 0-2.697.056-4.024.166C6.845 8.51 6 9.473 6 10.608v2.513m6-4.871c1.355 0 2.697.056 4.024.166C17.155 8.51 18 9.473 18 10.608v2.513M15 8.25v-1.5m-6 1.5v-1.5m12 9.75l-1.5.75a3.354 3.354 0 01-3 0 3.354 3.354 0 00-3 0 3.354 3.354 0 01-3 0 3.354 3.354 0 00-3 0 3.354 3.354 0 01-3 0L3 16.5m15-3.379a48.474 48.474 0 00-6-.371c-2.032 0-4.034.126-6 .371m12 0c.39.049.777.102 1.163.16 1.07.16 1.837 1.094 1.837 2.175v5.169c0 .621-.504 1.125-1.125 1.125H4.125A1.125 1.125 0 013 20.625v-5.17c0-1.08.768-2.014 1.837-2.174A47.78 47.78 0 016 13.12M16.5 3.75V16.5" />
                    </svg>
                    <span class="font-display text-xl md:text-2xl font-bold text-white" id="nav-brand"></span>
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a data-nav="true" href="/" class="text-gray-300 hover:text-brand-400 transition text-sm">Início</a>
                    <a data-nav="true" href="/menu" class="text-gray-300 hover:text-brand-400 transition text-sm">Cardápio</a>
                    <a data-nav="true" href="/gallery" class="text-gray-300 hover:text-brand-400 transition text-sm">Galeria</a>
                    <a data-nav="true" href="/about" class="text-gray-300 hover:text-brand-400 transition text-sm">Sobre</a>
                    <a data-nav="true" href="/contact" class="text-brand-400 font-medium text-sm">Contato</a>
                </div>
                <button id="menu-toggle" class="md:hidden text-white p-2"><svg class="w-6 h-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-dark-900/95 backdrop-blur border-t border-white/5">
            <div class="px-4 py-4 space-y-3">
                <a data-nav="true" href="/" class="block text-gray-300 py-2">Início</a>
                <a data-nav="true" href="/menu" class="block text-gray-300 py-2">Cardápio</a>
                <a data-nav="true" href="/gallery" class="block text-gray-300 py-2">Galeria</a>
                <a data-nav="true" href="/about" class="block text-gray-300 py-2">Sobre</a>
                <a data-nav="true" href="/contact" class="block text-brand-400 font-medium py-2">Contato</a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <main id="main-content" aria-label="Main Content">
        <section class="pt-32 pb-16 bg-dark-900">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-brand-400 font-medium tracking-widest uppercase text-sm mb-3">Contato</p>
                <h1 class="font-display text-4xl md:text-6xl font-bold text-white mb-4">Fale Conosco</h1>
                <p class="text-gray-400 text-lg max-w-2xl mx-auto">Estamos prontos para atendê-lo. Entre em contato por
                    qualquer canal.</p>
            </div>
        </section>

        <!-- CONTACT CONTENT -->
        <section class="pb-20 bg-dark-900">
            <div class="max-w-6xl mx-auto px-4">
                <div class="grid md:grid-cols-2 gap-12">
                    <!-- Info -->
                    <div class="reveal">
                        <div class="space-y-8">
                            <div class="flex items-start gap-4">
                                <div
                                    class="w-12 h-12 rounded-xl bg-brand-500/10 flex items-center justify-center flex-shrink-0">
                                    <svg class="w-6 h-6 text-brand-400" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z" />

                                            d="M15 11a3 3 0 11-6 0 3 3 0 016 0z" />
                                    </svg>
                                </div>
                                <div>
                                    <h3 class="text-white font-semibold mb-1">Endereço</h3>
                                    <p class="text-gray-400" id="contact-address"></p>
                                </div>
                            </div>

                            <div class="flex items-start gap-4">
                                <div
                                    class="w-12 h-12 rounded-xl bg-brand-500/10 flex items-center justify-center flex-shrink-0">
                                    <svg class="w-6 h-6 text-brand-400" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z" />
                                    </svg>
                                </div>
                                <div>
                                    <h3 class="text-white font-semibold mb-1">Telefone</h3>
                                    <p class="text-gray-400" id="contact-phone"></p>
                                </div>
                            </div>

                            <div class="flex items-start gap-4">
                                <div
                                    class="w-12 h-12 rounded-xl bg-brand-500/10 flex items-center justify-center flex-shrink-0">
                                    <svg class="w-6 h-6 text-brand-400" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z" />
                                    </svg>
                                </div>
                                <div>
                                    <h3 class="text-white font-semibold mb-1">Email</h3>
                                    <p class="text-gray-400" id="contact-email"></p>
                                </div>
                            </div>

                            <div class="flex items-start gap-4">
                                <div
                                    class="w-12 h-12 rounded-xl bg-brand-500/10 flex items-center justify-center flex-shrink-0">
                                    <svg class="w-6 h-6 text-brand-400" fill="none" viewBox="0 0 24 24"
                                        stroke="currentColor">
                                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                            d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z" />
                                    </svg>
                                </div>
                                <div>
                                    <h3 class="text-white font-semibold mb-1">Horários</h3>
                                    <p class="text-gray-400" id="contact-hours"></p>
                                </div>
                            </div>

                            <div class="pt-4">
                                <a data-nav="true" href="#" id="whatsapp-cta"
                                    class="btn-glow inline-flex items-center gap-2 bg-[#25d366] hover:bg-[#1da851] text-white px-8 py-4 rounded-full text-lg font-medium"
                                    target="_blank">
                                    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24">
                                        <path
                                            d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
                                    </svg>
                                    Falar pelo WhatsApp
                                </a>
                            </div>
                        </div>
                    </div>

                    <!-- Map -->
                    <div class="reveal">
                        <div class="rounded-2xl overflow-hidden border border-white/5 h-[500px]" id="map-container">
                            <iframe id="google-map"
                                src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3657.1976670254753!2d-46.65529378502211!3d-23.56517098468082!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMjPCsDMzJzU0LjYiUyA0NsKwMzknMTEuMSJX!5e0!3m2!1spt-BR!2sbr!4v1234567890"
                                width="100%" height="100%" style="border:0;" allowfullscreen="" loading="lazy"
                                referrerpolicy="no-referrer-when-downgrade">
                            </iframe>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="bg-dark-900 border-t border-white/5 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-600 text-sm" id="footer-copy"></p>
            <a data-nav="true" href="/privacy" class="text-gray-500 hover:text-brand-400 text-xs mt-2 inline-flex items-center justify-center min-h-[44px] py-2 transition">Política
                de Privacidade</a>
        </div>
    </footer>

    <!-- WHATSAPP -->
    <a data-nav="true" href="#" id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
        </svg>
    </a>

    <script src="/js/feedback.js"></script>
    <script src="/js/formValidation.js"></script>
    <script src="/js/app.js"></script>
    <script>
        function applyPageConfig(c) {
            setText('contact-address', c.restaurant_address);
            setText('contact-phone', c.restaurant_phone);
            setText('contact-email', c.restaurant_email);
            setText('contact-hours', c.opening_hours);

            if (c.google_maps_embed) {
                const iframe = document.getElementById('google-map');
                if (iframe) iframe.src = c.google_maps_embed;
            }
        }
    </script>
    <script src="/js/cart.js"></script>
    <script src="/js/whatsappFormatter.js"></script>
    <script src="/js/orderModal.js"></script>
    <script src="/js/cartUI.js"></script>
</body>

</html>
