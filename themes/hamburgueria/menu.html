<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio — Hamburgueria</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="page-name" content="Cardápio">
    <meta name="description"
        content="Confira nosso cardápio completo com hambúrgueres artesanais, combos e acompanhamentos. Peça pelo WhatsApp.">
    <link rel="canonical" href="">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:title" content="Cardápio — Hamburgueria">
    <meta property="og:description" content="Cardápio completo com hambúrgueres artesanais, combos e acompanhamentos.">
    <meta property="og:url" content="">
    <meta property="og:site_name" content="Hamburgueria">
    <meta property="og:image" content="">
    <!-- Preconnect -->
    <link rel="preconnect" href="https://res.cloudinary.com">
    <link rel="dns-prefetch" href="https://res.cloudinary.com">
    <link rel="stylesheet" href="/css/styles.css">
<link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0c0a09;
            color: #f5f5f4;
        }

        .font-display {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-glow {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(251, 191, 36, 0.35);
        }

        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.4);
        }

        .nav-glass {
            backdrop-filter: blur(16px);
            background: rgba(12, 10, 9, 0.85);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 999;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
            transition: transform 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        .category-tab {
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-tab.active {
            color: #fbbf24;
            border-color: #fbbf24;
        }

        /* FOUC prevention */
        body:not(.config-loaded) #nav-brand,
        body:not(.config-loaded) #footer-brand,
        body:not(.config-loaded) #footer-tagline,
        body:not(.config-loaded) #footer-copy,
        body:not(.config-loaded) #footer-address,
        body:not(.config-loaded) #footer-phone,
        body:not(.config-loaded) #footer-email,
        body:not(.config-loaded) .pt-32 {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        body.config-loaded #nav-brand,
        body.config-loaded #footer-brand,
        body.config-loaded #footer-tagline,
        body.config-loaded #footer-copy,
        body.config-loaded #footer-address,
        body.config-loaded #footer-phone,
        body.config-loaded #footer-email,
        body.config-loaded .pt-32 {
            opacity: 1;
            animation: configFadeIn 0.3s ease;
        }

        @keyframes configFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }

        /* Global Loader */
        body:not(.config-loaded) {
            overflow: hidden;
        }

        body:not(.config-loaded) #global-loader {
            opacity: 1;
            visibility: visible;
        }

        body.config-loaded #global-loader {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
    </style>
</head>

<body>
    <!-- Global Loader (prevent FOUC) -->
    <div id="global-loader"
        class="fixed inset-0 z-[99999] flex items-center justify-center bg-dark-900 transition-all duration-800">
        <div class="w-12 h-12 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
    </div>
    <a data-nav="true" href="#main-content"
        class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 focus:z-[100] focus:p-4 focus:bg-amber-500 focus:text-white">Pular
        para o conteúdo principal (skip)</a>

    <!-- NAVBAR -->
    <nav class="nav-glass fixed top-0 w-full z-50 border-b border-amber-400/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a data-nav="true" href="/" class="flex items-center gap-3">
                    <svg class="w-6 h-6 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.047 8.287 8.287 0 009 9.601a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z" />
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 18a3.75 3.75 0 00.495-7.468 5.99 5.99 0 00-1.925 3.547 5.975 5.975 0 01-2.133-1.001A3.75 3.75 0 0012 18z" />
                    </svg>
                    <span class="font-display text-xl md:text-2xl font-bold text-amber-400" id="nav-brand"></span>
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a data-nav="true" href="/"
                        class="text-stone-400 hover:text-amber-400 transition text-sm tracking-wide">Início</a>
                    <a data-nav="true" href="/menu"
                        class="text-amber-400 font-medium text-sm tracking-wide">Cardápio</a>
                    <a data-nav="true" href="/gallery"
                        class="text-stone-400 hover:text-amber-400 transition text-sm tracking-wide">Galeria</a>
                    <a data-nav="true" href="/about"
                        class="text-stone-400 hover:text-amber-400 transition text-sm tracking-wide">Sobre</a>
                    <a data-nav="true" href="/contact"
                        class="text-stone-400 hover:text-amber-400 transition text-sm tracking-wide">Contato</a>
                </div>
                <button id="menu-toggle" class="md:hidden text-white p-2"><svg class="w-6 h-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-zinc-950/95 backdrop-blur border-t border-amber-400/10">
            <div class="px-4 py-4 space-y-3">
                <a data-nav="true" href="/" class="block text-stone-400 py-2">Início</a>
                <a data-nav="true" href="/menu" class="block text-amber-400 font-medium py-2">Cardápio</a>
                <a data-nav="true" href="/gallery" class="block text-stone-400 py-2">Galeria</a>
                <a data-nav="true" href="/about" class="block text-stone-400 py-2">Sobre</a>
                <a data-nav="true" href="/contact" class="block text-stone-400 py-2">Contato</a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <main id="main-content" aria-label="Main Content">
        <section class="pt-32 pb-16 bg-zinc-950">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-amber-400 font-display font-medium tracking-[0.3em] text-sm mb-3">Cardápio</p>
                <h1 class="font-display text-4xl md:text-6xl font-bold text-white mb-4">Nosso Cardápio</h1>
                <p class="text-stone-400 text-lg max-w-2xl mx-auto">Blends artesanais, ingredientes premium e receitas
                    exclusivas — tudo feito na hora.</p>
            </div>
        </section>

        <!-- CATEGORY TABS -->
        <section class="sticky top-16 md:top-20 z-40 bg-zinc-950/90 backdrop-blur border-b border-amber-400/10">
            <div class="max-w-7xl mx-auto px-4">
                <div class="flex gap-2 overflow-x-auto py-4 scrollbar-hide" id="category-tabs">
                    <button
                        class="category-tab active px-5 py-2 rounded-full border border-amber-400 text-amber-400 text-sm font-medium whitespace-nowrap"
                        data-category="all">Todos</button>
                </div>
            </div>
        </section>

        <!-- MENU GRID -->
        <section class="py-16 bg-zinc-950">
            <div class="max-w-7xl mx-auto px-4" id="menu-container">
                <div class="text-center py-20 text-stone-500">Carregando cardápio...</div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer class="bg-zinc-950 border-t border-amber-400/10 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-stone-600 text-sm" id="footer-copy"></p>
            <a data-nav="true" href="/privacy"
                class="text-stone-600 hover:text-brand-400 text-xs mt-2 inline-block transition">Política
                de Privacidade</a>
        </div>
    </footer>

    <!-- WHATSAPP -->
    <a data-nav="true" href="#" id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
        </svg>
    </a>
    <script defer src="/js/mobile.js"></script>
    <script defer src="/js/a11y.js"></script>
    <script defer src="/js/feedback.js"></script>
    <script defer src="/js/formValidation.js"></script>
    <script defer src="/js/app.js"></script>
    <script defer src="/js/cart.js"></script>
    <script defer src="/js/whatsappFormatter.js"></script>
    <script defer src="/js/orderModal.js"></script>
    <script defer src="/js/cartUI.js"></script>
    <script>
        // --- Menu Page Logic ---
        let allCategories = [];
        let allDishes = [];
        let activeCategory = 'all';

        function escapeHTML(value) {
            const div = document.createElement('div');
            div.textContent = value ?? '';
            return div.innerHTML;
        }

        function escapeAttr(value) {
            return escapeHTML(value).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        async function loadMenu() {
            const categories = await api('/categories');
            if (!categories) return;
            allCategories = categories;
            allDishes = categories.flatMap(cat => cat.dishes.map(d => ({ ...d, category: { id: cat.id, name: cat.name, slug: cat.slug } })));

            // Build tabs
            const tabsContainer = document.getElementById('category-tabs');
            tabsContainer.textContent = '';

            const allBtn = document.createElement('button');
            allBtn.className = 'category-tab active px-5 py-2 rounded-full border border-amber-400 text-amber-400 text-sm font-medium whitespace-nowrap';
            allBtn.dataset.category = 'all';
            allBtn.textContent = 'Todos';
            allBtn.addEventListener('click', () => filterCategory('all'));
            tabsContainer.appendChild(allBtn);

            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = 'category-tab px-5 py-2 rounded-full border border-white/10 text-stone-400 text-sm font-medium whitespace-nowrap';
                btn.dataset.category = cat.slug || '';
                btn.textContent = cat.name || '';
                btn.addEventListener('click', () => filterCategory(cat.slug || 'all'));
                tabsContainer.appendChild(btn);
            });

            renderDishes(allDishes);

            // Check hash for scroll
            if (window.location.hash) {
                const slug = window.location.hash.slice(1);
                filterCategory(slug);
            }
        }

        function filterCategory(slug) {
            activeCategory = slug;

            // Update tabs
            document.querySelectorAll('.category-tab').forEach(tab => {
                if (tab.dataset.category === slug) {
                    tab.classList.add('active');
                    tab.classList.remove('border-white/10', 'text-stone-400');
                    tab.classList.add('border-amber-400', 'text-amber-400');
                } else {
                    tab.classList.remove('active', 'border-amber-400', 'text-amber-400');
                    tab.classList.add('border-white/10', 'text-stone-400');
                }
            });

            const filtered = slug === 'all'
                ? allDishes
                : allDishes.filter(d => d.category.slug === slug);

            renderDishes(filtered);
        }

        function renderDishes(dishes) {
            const container = document.getElementById('menu-container');
            if (dishes.length === 0) {
                container.innerHTML = '<p class="text-center py-20 text-stone-500">Nenhum prato encontrado.</p>';
                return;
            }

            const isClosed = window.isStoreCurrentlyOpen === false;
            const btnState = isClosed ? 'disabled style="opacity:0.5;cursor:not-allowed;"' : '';

            container.innerHTML = `
<div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
    ${dishes.map(dish => `
        <div class="card-hover reveal visible bg-stone-900/60 rounded-2xl overflow-hidden border border-amber-400/5 flex flex-col">
            <div class="relative h-48 overflow-hidden">
                <img src="${escapeAttr(dish.image || 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=400&q=80')}"
                     alt="${escapeAttr(dish.name)}" class="w-full h-full object-cover">
                ${dish.featured ? '<span class="absolute top-3 right-3 bg-amber-500 text-zinc-950 text-xs font-bold px-2 py-1 rounded-full">★ Destaque</span>' : ''}
            </div>
            <div class="p-5 flex-1 flex flex-col">
                <span class="text-amber-400 text-xs font-medium uppercase tracking-wider">${escapeHTML(dish.category?.name || '')}</span>
                <h3 class="font-bold text-lg text-white mt-1" style="font-family:'Oswald',sans-serif;text-transform:uppercase">${escapeHTML(dish.name)}</h3>
                <p class="text-stone-400 text-sm mt-2 flex-1">${escapeHTML(dish.description || '')}</p>
                <div class="space-y-3 mt-4 pt-4 border-t border-amber-400/10">
                    <div class="flex items-center justify-between">
                        <span class="text-amber-400 font-bold text-xl">${formatPrice(dish.price)}</span>
                    </div>
                    <div class="grid grid-cols-2 gap-2">
                        <button ${btnState} data-action="quick" data-id="${dish.id}" data-name="${escapeAttr(dish.name)}" data-image="${escapeAttr(dish.image || '')}" data-price="${dish.price}" class="order-btn text-sm bg-green-600 hover:bg-green-700 text-white px-3 py-3 rounded-xl transition flex items-center justify-center gap-1 font-medium">
                            <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
                            Pedir Agora
                        </button>
                        <button ${btnState} data-action="cart" data-id="${dish.id}" data-name="${escapeAttr(dish.name)}" data-image="${escapeAttr(dish.image || '')}" data-price="${dish.price}" class="order-btn text-sm bg-amber-500 hover:bg-amber-600 text-zinc-950 px-3 py-3 rounded-xl transition flex items-center justify-center gap-1 font-bold">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                            Adicionar
                        </button>
                    </div>
                </div>
            </div>
        </div>
    `).join('')}
</div>
    `;
        }

        function quickOrder(id, name, image, price) {
            const dish = { id, name, image, price };
            window.orderModal.openQuickOrder(dish);
        }

        function addToCart(id, name, image, price) {
            const dish = { id, name, image, price };
            window.cart.add(dish);

            const toast = document.createElement('div');
            toast.className = 'fixed top-24 right-4 z-[9999] bg-green-600 text-white px-6 py-4 rounded-xl shadow-2xl font-medium transform transition-all flex items-center gap-3';

            const svgNS = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('class', 'w-6 h-6');
            svg.setAttribute('fill', 'none');
            svg.setAttribute('stroke', 'currentColor');
            svg.setAttribute('viewBox', '0 0 24 24');
            const path = document.createElementNS(svgNS, 'path');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('stroke-linejoin', 'round');
            path.setAttribute('stroke-width', '2');
            path.setAttribute('d', 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z');
            svg.appendChild(path);

            const textDiv = document.createElement('div');
            const titleDiv = document.createElement('div');
            titleDiv.className = 'font-bold';
            titleDiv.textContent = 'Adicionado ao carrinho!';
            const subtitleDiv = document.createElement('div');
            subtitleDiv.className = 'text-sm text-green-100';
            subtitleDiv.textContent = 'Clique no botão amarelo no canto inferior direito';
            textDiv.appendChild(titleDiv);
            textDiv.appendChild(subtitleDiv);

            toast.appendChild(svg);
            toast.appendChild(textDiv);
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // Event delegation for order buttons
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.order-btn');
            if (!btn) return;

            const action = btn.dataset.action;
            const id = btn.dataset.id;
            const name = btn.dataset.name;
            const image = btn.dataset.image;
            const price = Number(btn.dataset.price);

            if (action === 'quick') {
                quickOrder(id, name, image, price);
            } else if (action === 'cart') {
                addToCart(id, name, image, price);
            }
        });

        document.addEventListener('DOMContentLoaded', loadMenu);
    </script>
</body>

</html>
