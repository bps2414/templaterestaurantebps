<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria — Hamburgueria</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg">
    <meta name="page-name" content="Galeria">
    <meta name="description" content="Galeria de fotos — Conheça nossos hambúrgueres, ambiente e pratos especiais.">
    <link rel="canonical" href="">
    <!-- Open Graph -->
    <meta property="og:type" content="website">
    <meta property="og:locale" content="pt_BR">
    <meta property="og:title" content="Galeria — Hamburgueria">
    <meta property="og:description" content="Galeria de fotos — Nossos hambúrgueres e ambiente.">
    <meta property="og:url" content="">
    <meta property="og:site_name" content="Hamburgueria">
    <meta property="og:image" content="">
    <!-- Preconnect -->
    <link rel="preconnect" href="https://res.cloudinary.com">
    <link rel="dns-prefetch" href="https://res.cloudinary.com">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 400: '#fbbf24', 500: '#f59e0b', 600: '#d97706' }, dark: { 800: '#1c1917', 900: '#0c0a09' } }, fontFamily: { display: ['Oswald', 'sans-serif'], body: ['Inter', 'sans-serif'] } } } };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0c0a09;
            color: #f5f5f4;
        }

        .font-display {
            font-family: 'Oswald', sans-serif;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .nav-glass {
            backdrop-filter: blur(16px);
            background: rgba(12, 10, 9, 0.85);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 999;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
            transition: transform 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        .gallery-item {
            cursor: pointer;
            overflow: hidden;
            border-radius: 1rem;
        }

        .gallery-item img {
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 0.5rem;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            cursor: pointer;
            z-index: 10000;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            cursor: pointer;
            padding: 16px;
            font-size: 2rem;
        }

        .lightbox-prev {
            left: 16px;
        }

        .lightbox-next {
            right: 16px;
        }

        /* FOUC prevention */
        body:not(.config-loaded) #nav-brand,
        body:not(.config-loaded) #footer-brand,
        body:not(.config-loaded) #footer-tagline,
        body:not(.config-loaded) #footer-copy,
        body:not(.config-loaded) .pt-32 {
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        body.config-loaded #nav-brand,
        body.config-loaded #footer-brand,
        body.config-loaded #footer-tagline,
        body.config-loaded #footer-copy,
        body.config-loaded .pt-32 {
            opacity: 1;
            animation: configFadeIn 0.3s ease;
        }

        @keyframes configFadeIn {
            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }
        }
    </style>
</head>

<body>
    <a data-nav="true" href="#main-content"
        class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 focus:z-[100] focus:p-4 focus:bg-amber-500 focus:text-white">Pular
        para o conteúdo principal (skip)</a>

    <!-- NAVBAR -->
    <nav class="nav-glass fixed top-0 w-full z-50 border-b border-amber-400/10">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a data-nav="true" href="/" class="flex items-center gap-3">
                    <svg class="w-6 h-6 text-amber-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"
                        stroke-width="1.5">
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M15.362 5.214A8.252 8.252 0 0112 21 8.25 8.25 0 016.038 7.047 8.287 8.287 0 009 9.601a8.983 8.983 0 013.361-6.867 8.21 8.21 0 003 2.48z" />
                        <path stroke-linecap="round" stroke-linejoin="round"
                            d="M12 18a3.75 3.75 0 00.495-7.468 5.99 5.99 0 00-1.925 3.547 5.975 5.975 0 01-2.133-1.001A3.75 3.75 0 0012 18z" />
                    </svg>
                    <span class="font-display text-xl md:text-2xl font-bold text-amber-400" id="nav-brand"></span>
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a data-nav="true" href="/" class="text-stone-400 hover:text-amber-400 transition text-sm tracking-wide">Início</a>
                    <a data-nav="true" href="/menu"
                        class="text-stone-400 hover:text-amber-400 transition text-sm tracking-wide">Cardápio</a>
                    <a data-nav="true" href="/gallery" class="text-amber-400 font-medium text-sm tracking-wide">Galeria</a>
                    <a data-nav="true" href="/about"
                        class="text-stone-400 hover:text-amber-400 transition text-sm tracking-wide">Sobre</a>
                    <a data-nav="true" href="/contact"
                        class="text-stone-400 hover:text-amber-400 transition text-sm tracking-wide">Contato</a>
                </div>
                <button id="menu-toggle" class="md:hidden text-white p-2"><svg class="w-6 h-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-zinc-950/95 backdrop-blur border-t border-amber-400/10">
            <div class="px-4 py-4 space-y-3">
                <a data-nav="true" href="/" class="block text-stone-400 py-2">Início</a>
                <a data-nav="true" href="/menu" class="block text-stone-400 py-2">Cardápio</a>
                <a data-nav="true" href="/gallery" class="block text-amber-400 font-medium py-2">Galeria</a>
                <a data-nav="true" href="/about" class="block text-stone-400 py-2">Sobre</a>
                <a data-nav="true" href="/contact" class="block text-stone-400 py-2">Contato</a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <main id="main-content" aria-label="Main Content">
        <section class="pt-32 pb-16 bg-zinc-950">
            <div class="max-w-7xl mx-auto px-4 text-center">
                <p class="text-amber-400 font-display font-medium tracking-[0.3em] text-sm mb-3">Galeria</p>
                <h1 class="font-display text-4xl md:text-6xl font-bold text-white mb-4">Nossos Momentos</h1>
                <p class="text-stone-400 text-lg max-w-2xl mx-auto">Blends suculentos, batatas crocantes e a vibe da
                    nossa
                    cozinha.</p>
            </div>
        </section>

        <!-- GALLERY GRID -->
        <section class="pb-20 bg-zinc-950">
            <div class="max-w-7xl mx-auto px-4">
                <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="gallery-grid">
                    <div class="text-center py-20 col-span-full text-stone-500">Carregando galeria...</div>
                </div>
            </div>
        </section>
    </main>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()"
            onkeydown="if(event.key==='Enter' || event.key===' ') closeLightbox()" aria-label="Fechar">
            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <button class="lightbox-nav lightbox-prev" onclick="prevImage()"
            onkeydown="if(event.key==='Enter' || event.key===' ') prevImage()" aria-label="Anterior">‹</button>
        <img id="lightbox-img" src="" alt="">
        <button class="lightbox-nav lightbox-next" onclick="nextImage()"
            onkeydown="if(event.key==='Enter' || event.key===' ') nextImage()" aria-label="Próximo">›</button>
    </div>

    <!-- FOOTER -->
    <footer class="bg-zinc-950 border-t border-amber-400/10 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-stone-600 text-sm" id="footer-copy"></p>
            <a data-nav="true" href="/privacy" class="text-stone-600 hover:text-brand-400 text-xs mt-2 inline-block transition">Política
                de Privacidade</a>
        </div>
    </footer>

    <!-- WHATSAPP -->
    <a data-nav="true" href="#" id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
        </svg>
    </a>

    <script src="/js/feedback.js"></script>
    <script src="/js/formValidation.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/whatsappFormatter.js"></script>
    <script src="/js/orderModal.js"></script>
    <script src="/js/cartUI.js"></script>
    <script>
        let galleryImages = [];
        let currentIndex = 0;

        function escapeHTMLGallery(value) {
            const div = document.createElement('div');
            div.textContent = value ?? '';
            return div.innerHTML;
        }
        function escapeAttrGallery(value) {
            return escapeHTMLGallery(value).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        async function loadGallery() {
            const data = await api('/gallery');

            if (!data || data.length === 0) {
                const grid = document.getElementById('gallery-grid');
                grid.innerHTML = '<div class="text-center py-20 col-span-full text-stone-500">Nenhuma imagem na galeria ainda. Adicione fotos pelo painel admin.</div>';
                return;
            }

            galleryImages = data;
            const grid = document.getElementById('gallery-grid');
            grid.textContent = '';
            galleryImages.forEach(function (img, i) {
                var item = document.createElement('div');
                item.className = 'gallery-item aspect-square';
                item.dataset.index = i;

                var image = document.createElement('img');
                image.src = img.src;
                image.alt = img.alt || '';
                image.className = 'w-full h-full object-cover';
                image.loading = 'lazy';
                item.appendChild(image);

                item.addEventListener('click', function () { openLightbox(i); });
                grid.appendChild(item);
            });
        }

        function openLightbox(index) {
            currentIndex = index;
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = galleryImages[index].src;
            lbImg.alt = galleryImages[index].alt || '';
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % galleryImages.length;
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = galleryImages[currentIndex].src;
            lbImg.alt = galleryImages[currentIndex].alt || '';
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = galleryImages[currentIndex].src;
            lbImg.alt = galleryImages[currentIndex].alt || '';
        }

        document.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            if (!lb.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>

</html>
