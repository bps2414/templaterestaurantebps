  <link rel="canonical" href="">

  <meta property="og:title" content="Contato — Açaí do Bairro">
  <meta property="og:description" content="Entre em contato com o Açaí do Bairro. Faça seu pedido pelo WhatsApp!">
  <meta property="og:url" content="">
  <meta property="og:site_name" content="Açaí do Bairro">
  <meta property="og:image" content="">

  <meta name="twitter:description" content="Entre em contato com o Açaí do Bairro. Faça seu pedido pelo WhatsApp!">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload"
    href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap"
    as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript>
    <link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Inter:wght@400;500;600;700&display=swap">
  </noscript>
  <style>
    :root {
      --brand: #7C3AED;
      --brand-dark: #6D28D9;
      --accent: #84CC16;
      --bg: #FAF5FF;
      --surface: #F3E8FF;
      --text: #1E1B4B;
      --muted: #6B21A8;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    h1,
    h2,
    h3 {
      font-family: 'Fredoka', sans-serif;
      font-weight: 600;
    }

    a {
      text-decoration: none;
    }

    .topnav {
      background: #fff;
      border-bottom: 2px solid #DDD6FE;
      position: sticky;
      top: 0;
      z-index: 50;
      box-shadow: 0 1px 4px rgba(124, 58, 237, .08);
    }

    .topnav-inner {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 1rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 56px;
    }

    .topnav-brand {
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .topnav-brand .logo-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--brand);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .topnav-brand .logo-icon svg {
      width: 20px;
      height: 20px;
      color: #fff;
    }

    #nav-brand {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.35rem;
      font-weight: 700;
      color: var(--brand);
    }

    .nav-links {
      display: flex;
      gap: 1.5rem;
    }

    .nav-links a {
      font-size: .875rem;
      font-weight: 600;
      color: var(--muted);
      transition: color .2s;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--brand);
    }

    .nav-ham {
      display: none;
      background: none;
      border: none;
      padding: .25rem;
      cursor: pointer;
      color: var(--brand);
    }

    #mobile-nav {
      display: none;
      background: #fff;
      border-top: 1px solid #DDD6FE;
    }

    #mobile-nav a {
      display: block;
      padding: .75rem 1rem;
      font-weight: 600;
      color: var(--muted);
      font-size: .95rem;
    }

    #mobile-nav a:hover,
    #mobile-nav a.active {
      color: var(--brand);
    }

    @media(max-width:640px) {
      .nav-links {
        display: none;
      }

      .nav-ham {
        display: block;
      }
    }

    #store-status-banner {
      display: none;
      background: #F3E8FF;
      border-bottom: 1px solid #DDD6FE;
      padding: .4rem 1rem;
      text-align: center;
      font-size: .8rem;
      font-weight: 600;
      color: #6D28D9;
    }

    #store-status-banner.closed {
      display: block;
    }

    .page-header {
      background: #F3E8FF;
      border-bottom: 2px solid #DDD6FE;
      padding: 2rem 1rem;
      text-align: center;
    }

    .page-header h1 {
      font-family: 'Fredoka', sans-serif;
      font-size: 2rem;
      font-weight: 700;
      color: var(--text);
    }

    .section {
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1rem;
    }

    .contact-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1.5rem;
    }

    @media(max-width:640px) {
      .contact-grid {
        grid-template-columns: 1fr;
      }
    }

    .info-card {
      background: #fff;
      border: 1.5px solid #DDD6FE;
      border-radius: 16px;
      padding: 1.5rem;
    }

    .info-card h2 {
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .info-item {
      display: flex;
      align-items: flex-start;
      gap: .75rem;
      margin-bottom: 1rem;
    }

    .info-icon {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--surface);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .info-icon svg {
      width: 18px;
      height: 18px;
      color: var(--brand);
    }

    .info-label {
      font-size: .72rem;
      color: var(--muted);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    .info-value {
      font-size: .9rem;
      color: var(--text);
      margin-top: .1rem;
    }

    .social-links {
      display: flex;
      gap: .75rem;
      margin-top: 1rem;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: .4rem;
      font-size: .85rem;
      font-weight: 600;
      color: var(--brand);
      padding: .5rem .9rem;
      border-radius: 999px;
      background: var(--surface);
      transition: all .2s;
    }

    .social-link:hover {
      background: var(--brand);
      color: #fff;
    }

    .social-link svg {
      width: 18px;
      height: 18px;
    }

    .form-card {
      background: #fff;
      border: 1.5px solid #DDD6FE;
      border-radius: 16px;
      padding: 1.5rem;
    }

    .form-card h2 {
      font-size: 1.3rem;
      color: var(--text);
      margin-bottom: 1rem;
    }

    .form-group {
      margin-bottom: 1rem;
    }

    .form-group label {
      display: block;
      font-size: .8rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: .3rem;
    }

    .form-group input,
    .form-group textarea {
      width: 100%;
      border: 2px solid #DDD6FE;
      border-radius: 12px;
      padding: .6rem .8rem;
      font-size: .9rem;
      font-family: 'Inter', sans-serif;
      background: #FAF5FF;
      color: var(--text);
      transition: border-color .2s;
      outline: none;
    }

    .form-group input:focus,
    .form-group textarea:focus {
      border-color: var(--brand);
    }

    .form-group textarea {
      resize: vertical;
      min-height: 100px;
    }

    .btn-submit {
      display: inline-flex;
      align-items: center;
      gap: .4rem;
      background: var(--brand);
      color: #fff;
      border: none;
      font-weight: 700;
      padding: .7rem 1.5rem;
      border-radius: 999px;
      font-size: .9rem;
      cursor: pointer;
      transition: background .2s, transform .15s;
      width: 100%;
      justify-content: center;
    }

    .btn-submit:hover {
      background: var(--brand-dark);
      transform: translateY(-1px);
    }

    footer {
      background: #F3E8FF;
      border-top: 2px solid #DDD6FE;
      padding: 2rem 1rem;
      text-align: center;
    }

    .footer-inner {
      max-width: 900px;
      margin: 0 auto;
    }

    #footer-brand {
      font-family: 'Fredoka', sans-serif;
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--brand);
      display: block;
      margin-bottom: .25rem;
    }

    #footer-tagline {
      font-size: .8rem;
      color: var(--muted);
      display: block;
      margin-bottom: .5rem;
    }

    #footer-copy {
      font-size: .72rem;
      color: #A78BFA;
      margin-top: .5rem;
      display: block;
    }

    .whatsapp-float {
      position: fixed;
      bottom: 20px;
      left: 20px;
      z-index: 999;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #25D366;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 3px 14px rgba(37, 211, 102, .45);
      transition: transform .2s;
    }

    .whatsapp-float:hover {
      transform: scale(1.1);
    }

    #global-loader {
      position: fixed;
      inset: 0;
      z-index: 99999;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
      transition: opacity .4s, visibility .4s;
    }

    #global-loader .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid #DDD6FE;
      border-top-color: var(--brand);
      border-radius: 50%;
      animation: spin .8s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    body:not(.config-loaded) #global-loader {
      opacity: 1;
      visibility: visible;
    }

    body.config-loaded #global-loader {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
    }

    body:not(.config-loaded) {
      overflow: hidden;
    }

    /* Shared JS modal/cart dark-theme compat */
    .bg-dark-700 {
      background-color: #334155
    }

    .bg-dark-800 {
      background-color: #1e293b
    }

    .bg-dark-900 {
      background-color: #0f172a
    }

    .bg-dark-800\/60 {
      background-color: rgba(30, 41, 59, .6)
    }

    .bg-brand-500 {
      background-color: var(--brand)
    }

    .bg-brand-600 {
      background-color: var(--brand-dark)
    }

    .hover\:bg-brand-600:hover {
      background-color: var(--brand-dark)
    }

    .hover\:bg-dark-900:hover {
      background-color: #0f172a
    }

    .text-brand-400 {
      color: var(--brand)
    }

    .focus\:border-brand-400:focus {
      border-color: var(--brand)
    }

    .border-white\/10 {
      border-color: rgba(255, 255, 255, .1)
    }

    .border-white\/5 {
      border-color: rgba(255, 255, 255, .05)
    }

    @media(prefers-reduced-motion:reduce) {

      *,
      ::before,
      ::after {
        animation-duration: .01ms !important;
        transition-duration: .01ms !important;
      }
    }
  </style>
</head>

<body>
  <div id="global-loader">
    <div class="spinner"></div>
  </div>
  <div id="store-status-banner">Estamos fechados no momento. Volte logo!</div>

  <nav class="topnav" role="navigation" aria-label="Menu principal">

  <script defer src="/js/cartUI-lite.js"></script>
  <script>
    document.getElementById('nav-ham-btn').addEventListener('click', function () {
      const mn = document.getElementById('mobile-nav');
      const expanded = this.getAttribute('aria-expanded') === 'true';
      mn.style.display = expanded ? 'none' : 'block';
      this.setAttribute('aria-expanded', String(!expanded));
    });
    window.applyStoreStatus = function (open) {
      const b = document.getElementById('store-status-banner');
      if (b) b.classList.toggle('closed', !open);
    };
    (function () {
      const form = document.getElementById('contact-form');
      if (!form) return;
      form.addEventListener('submit', function (e) {
        e.preventDefault();
        const name = document.getElementById('contact-name').value.trim();
        const msg = document.getElementById('contact-message').value.trim();
        if (!name || !msg) return;
        const phone = document.getElementById('footer-phone')?.textContent?.replace(/\D/g, '') || '';
        const text = encodeURIComponent('Olá! Meu nome é ' + name + '. ' + msg);
        window.open('https://wa.me/55' + phone + '?text=' + text, '_blank');
      });
    })();
    function applyPageConfig(c) {
      if (c.google_maps_embed) {
        const m = document.getElementById('google-map');
        const mc = document.getElementById('map-container');
        if (m) m.src = c.google_maps_embed;
        if (mc) mc.style.display = 'block';
      }
    }
  </script>
</body>

</html>
