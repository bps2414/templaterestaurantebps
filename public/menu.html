<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cardápio — Sabor & Arte</title>
    <meta name="page-name" content="Cardápio">
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Inter:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 50: '#fef7ee', 100: '#fdecd7', 200: '#fad5ae', 300: '#f6b77a', 400: '#f19244', 500: '#ee7620', 600: '#d95c16', 700: '#b44314', 800: '#8f3618', 900: '#7a2f16' }, dark: { 800: '#1a1a2e', 900: '#0f0f1a' } }, fontFamily: { display: ['Playfair Display', 'serif'], body: ['Inter', 'sans-serif'] } } } };
    </script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #f5f5f5;
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }

        .reveal {
            opacity: 0;
            transform: translateY(40px);
            transition: opacity 0.8s ease, transform 0.8s ease;
        }

        .reveal.visible {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-glow {
            position: relative;
            overflow: hidden;
            transition: all 0.3s ease;
        }

        .btn-glow:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(238, 118, 32, 0.4);
        }

        .card-hover {
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card-hover:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.3);
        }

        .nav-glass {
            backdrop-filter: blur(12px);
            background: rgba(15, 15, 26, 0.8);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 999;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
            transition: transform 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        .category-tab {
            cursor: pointer;
            transition: all 0.3s;
        }

        .category-tab.active {
            color: #ee7620;
            border-color: #ee7620;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="nav-glass fixed top-0 w-full z-50 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a href="/" class="flex items-center gap-3">
                    <span class="text-2xl">🍽</span>
                    <span class="font-display text-xl md:text-2xl font-bold text-white" id="nav-brand">Sabor &
                        Arte</span>
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a href="/" class="text-gray-300 hover:text-brand-400 transition text-sm">Início</a>
                    <a href="/menu" class="text-brand-400 font-medium text-sm">Cardápio</a>
                    <a href="/gallery" class="text-gray-300 hover:text-brand-400 transition text-sm">Galeria</a>
                    <a href="/about" class="text-gray-300 hover:text-brand-400 transition text-sm">Sobre</a>
                    <a href="/contact" class="text-gray-300 hover:text-brand-400 transition text-sm">Contato</a>
                </div>
                <button id="menu-toggle" class="md:hidden text-white p-2"><svg class="w-6 h-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-dark-900/95 backdrop-blur border-t border-white/5">
            <div class="px-4 py-4 space-y-3">
                <a href="/" class="block text-gray-300 py-2">Início</a>
                <a href="/menu" class="block text-brand-400 font-medium py-2">Cardápio</a>
                <a href="/gallery" class="block text-gray-300 py-2">Galeria</a>
                <a href="/about" class="block text-gray-300 py-2">Sobre</a>
                <a href="/contact" class="block text-gray-300 py-2">Contato</a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="pt-32 pb-16 bg-dark-900">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-brand-400 font-medium tracking-widest uppercase text-sm mb-3">Cardápio</p>
            <h1 class="font-display text-4xl md:text-6xl font-bold text-white mb-4">Nosso Cardápio</h1>
            <p class="text-gray-400 text-lg max-w-2xl mx-auto">Cada prato é preparado com ingredientes selecionados e
                dedicação artesanal.</p>
        </div>
    </section>

    <!-- CATEGORY TABS -->
    <section class="sticky top-16 md:top-20 z-40 bg-dark-900/90 backdrop-blur border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex gap-2 overflow-x-auto py-4 scrollbar-hide" id="category-tabs">
                <button
                    class="category-tab active px-5 py-2 rounded-full border border-brand-400 text-brand-400 text-sm font-medium whitespace-nowrap"
                    data-category="all">Todos</button>
            </div>
        </div>
    </section>

    <!-- MENU GRID -->
    <section class="py-16 bg-dark-900">
        <div class="max-w-7xl mx-auto px-4" id="menu-container">
            <div class="text-center py-20 text-gray-500">Carregando cardápio...</div>
        </div>
    </section>

    <!-- FOOTER -->
    <footer class="bg-dark-900 border-t border-white/5 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-600 text-sm" id="footer-copy">© 2026 Sabor & Arte</p>
        </div>
    </footer>

    <!-- WHATSAPP -->
    <a href="#" id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z" />
        </svg>
    </a>

    <script src="/js/performance.js"></script>
    <script src="/js/mobile.js"></script>
    <script src="/js/a11y.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/whatsappFormatter.js"></script>
    <script src="/js/orderModal.js"></script>
    <script src="/js/cartUI.js"></script>
    <script>
        // --- Menu Page Logic ---
        let allCategories = [];
        let allDishes = [];
        let activeCategory = 'all';

        async function loadMenu() {
            const categories = await api('/categories');
            if (!categories) return;
            allCategories = categories;
            allDishes = categories.flatMap(cat => cat.dishes.map(d => ({ ...d, category: { id: cat.id, name: cat.name, slug: cat.slug } })));

            // Build tabs
            const tabsContainer = document.getElementById('category-tabs');
            tabsContainer.innerHTML = `
        <button class="category-tab active px-5 py-2 rounded-full border border-brand-400 text-brand-400 text-sm font-medium whitespace-nowrap" data-category="all" onclick="filterCategory('all')">Todos</button>
        ${categories.map(cat => `
            <button class="category-tab px-5 py-2 rounded-full border border-white/10 text-gray-400 text-sm font-medium whitespace-nowrap" data-category="${cat.slug}" onclick="filterCategory('${cat.slug}')">${cat.name}</button>
        `).join('')}
    `;

            renderDishes(allDishes);

            // Check hash for scroll
            if (window.location.hash) {
                const slug = window.location.hash.slice(1);
                filterCategory(slug);
            }
        }

        function filterCategory(slug) {
            activeCategory = slug;

            // Update tabs
            document.querySelectorAll('.category-tab').forEach(tab => {
                if (tab.dataset.category === slug) {
                    tab.classList.add('active');
                    tab.classList.remove('border-white/10', 'text-gray-400');
                    tab.classList.add('border-brand-400', 'text-brand-400');
                } else {
                    tab.classList.remove('active', 'border-brand-400', 'text-brand-400');
                    tab.classList.add('border-white/10', 'text-gray-400');
                }
            });

            const filtered = slug === 'all'
                ? allDishes
                : allDishes.filter(d => d.category.slug === slug);

            renderDishes(filtered);
        }

        function renderDishes(dishes) {
            const container = document.getElementById('menu-container');
            if (dishes.length === 0) {
                container.innerHTML = '<p class="text-center py-20 text-gray-500">Nenhum prato encontrado.</p>';
                return;
            }

            container.innerHTML = `
        <div class="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
            ${dishes.map(dish => `
                <div class="card-hover reveal visible bg-dark-800/60 rounded-xl overflow-hidden border border-white/5 flex flex-col">
                    <div class="relative h-48 overflow-hidden">
                        <img src="${dish.image || 'https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=400&q=80'}"
                             alt="${dish.name}" class="w-full h-full object-cover">
                        ${dish.featured ? '<span class="absolute top-3 right-3 bg-brand-500 text-white text-xs font-bold px-2 py-1 rounded-full">★ Destaque</span>' : ''}
                    </div>
                    <div class="p-5 flex-1 flex flex-col">
                        <span class="text-brand-400 text-xs font-medium uppercase tracking-wider">${dish.category?.name || ''}</span>
                        <h3 class="font-display text-lg font-bold text-white mt-1">${dish.name}</h3>
                        <p class="text-gray-400 text-sm mt-2 flex-1">${dish.description || ''}</p>
                        <div class="space-y-3 mt-4 pt-4 border-t border-white/5">
                            <div class="flex items-center justify-between">
                                <span class="text-brand-400 font-bold text-xl">${formatPrice(dish.price)}</span>
                            </div>
                            <div class="grid grid-cols-2 gap-2">
                                <button data-action="quick" data-id="${dish.id}" data-name="${dish.name}" data-image="${dish.image || ''}" data-price="${dish.price}" class="order-btn text-xs bg-green-600 hover:bg-green-700 text-white px-3 py-2.5 rounded-lg transition flex items-center justify-center gap-1 font-medium">
                                    <svg class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/></svg>
                                    Pedir Agora
                                </button>
                                <button data-action="cart" data-id="${dish.id}" data-name="${dish.name}" data-image="${dish.image || ''}" data-price="${dish.price}" class="order-btn text-xs bg-brand-500 hover:bg-brand-600 text-white px-3 py-2.5 rounded-lg transition flex items-center justify-center gap-1 font-medium">
                                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 3h2l.4 2M7 13h10l4-8H5.4M7 13L5.4 5M7 13l-2.293 2.293c-.63.63-.184 1.707.707 1.707H17m0 0a2 2 0 100 4 2 2 0 000-4zm-8 2a2 2 0 11-4 0 2 2 0 014 0z"/></svg>
                                    Adicionar
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `).join('')}
        </div>
    `;
        }

        function quickOrder(id, name, image, price) {
            const dish = { id, name, image, price };
            window.orderModal.openQuickOrder(dish);
        }

        function addToCart(id, name, image, price) {
            const dish = { id, name, image, price };
            window.cart.add(dish);

            // Toast notification melhorado (XSS-safe, no innerHTML)
            const toast = document.createElement('div');
            toast.className = 'fixed top-24 right-4 z-[9999] bg-green-600 text-white px-6 py-4 rounded-xl shadow-2xl font-medium transform transition-all flex items-center gap-3';

            const svgNS = 'http://www.w3.org/2000/svg';
            const svg = document.createElementNS(svgNS, 'svg');
            svg.setAttribute('class', 'w-6 h-6');
            svg.setAttribute('fill', 'none');
            svg.setAttribute('stroke', 'currentColor');
            svg.setAttribute('viewBox', '0 0 24 24');
            const path = document.createElementNS(svgNS, 'path');
            path.setAttribute('stroke-linecap', 'round');
            path.setAttribute('stroke-linejoin', 'round');
            path.setAttribute('stroke-width', '2');
            path.setAttribute('d', 'M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z');
            svg.appendChild(path);

            const textDiv = document.createElement('div');
            const titleDiv = document.createElement('div');
            titleDiv.className = 'font-bold';
            titleDiv.textContent = 'Adicionado ao carrinho!';
            const subtitleDiv = document.createElement('div');
            subtitleDiv.className = 'text-sm text-green-100';
            subtitleDiv.textContent = 'Clique no botão laranja no canto inferior direito';
            textDiv.appendChild(titleDiv);
            textDiv.appendChild(subtitleDiv);

            toast.appendChild(svg);
            toast.appendChild(textDiv);
            document.body.appendChild(toast);

            setTimeout(() => {
                toast.style.opacity = '0';
                toast.style.transform = 'translateY(-20px)';
                setTimeout(() => toast.remove(), 300);
            }, 3500);
        }

        // Event delegation for order buttons
        document.addEventListener('click', (e) => {
            const btn = e.target.closest('.order-btn');
            if (!btn) return;

            const action = btn.dataset.action;
            const id = btn.dataset.id;
            const name = btn.dataset.name;
            const image = btn.dataset.image;
            const price = Number(btn.dataset.price);

            if (action === 'quick') {
                quickOrder(id, name, image, price);
            } else if (action === 'cart') {
                addToCart(id, name, image, price);
            }
        });

        document.addEventListener('DOMContentLoaded', loadMenu);
    </script>
</body>

</html>
