    <script>
        tailwind.config = { theme: { extend: { colors: { brand: { 400: '#f19244', 500: '#ee7620', 600: '#d95c16' }, dark: { 800: '#1a1a2e', 900: '#0f0f1a' } }, fontFamily: { display: ['Playfair Display', 'serif'], body: ['Inter', 'sans-serif'] } } } };

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background: #0f0f1a;
            color: #f5f5f5;
        }

        .font-display {
            font-family: 'Playfair Display', serif;
        }

        .nav-glass {
            backdrop-filter: blur(12px);
            background: rgba(15, 15, 26, 0.8);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 999;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
            transition: transform 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        .gallery-item {
            cursor: pointer;
            overflow: hidden;
            border-radius: 0.75rem;
        }

        .gallery-item img {
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        /* Lightbox */
        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 0.5rem;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            cursor: pointer;
            z-index: 10000;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            cursor: pointer;
            padding: 16px;
            font-size: 2rem;
        }

        .lightbox-prev {
            left: 16px;
        }

        .lightbox-next {
            right: 16px;
        }
        /* FOUC prevention */
        body:not(.config-loaded) #nav-brand,
        body:not(.config-loaded) #footer-brand,
        body:not(.config-loaded) #footer-tagline,
        body:not(.config-loaded) #footer-copy,
        body:not(.config-loaded) .pt-32 {
            opacity: 0;
            transition: opacity 0.3s ease;
        }
        body.config-loaded #nav-brand,
        body.config-loaded #footer-brand,
        body.config-loaded #footer-tagline,
        body.config-loaded #footer-copy,
        body.config-loaded .pt-32 {
            opacity: 1;
            animation: configFadeIn 0.3s ease;
        }
        @keyframes configFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="nav-glass fixed top-0 w-full z-50 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a href="/" class="flex items-center gap-3">
                    <span class="text-2xl">🍽</span>
                    <span class="font-display text-xl md:text-2xl font-bold text-white" id="nav-brand"></span>
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a href="/" class="text-gray-300 hover:text-brand-400 transition text-sm">Início</a>
                    <a href="/menu" class="text-gray-300 hover:text-brand-400 transition text-sm">Cardápio</a>
                    <a href="/gallery" class="text-brand-400 font-medium text-sm">Galeria</a>
                    <a href="/about" class="text-gray-300 hover:text-brand-400 transition text-sm">Sobre</a>
                    <a href="/contact" class="text-gray-300 hover:text-brand-400 transition text-sm">Contato</a>
                </div>
                <button id="menu-toggle" class="md:hidden text-white p-2"><svg class="w-6 h-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-dark-900/95 backdrop-blur border-t border-white/5">
            <div class="px-4 py-4 space-y-3">
                <a href="/" class="block text-gray-300 py-2">Início</a>
                <a href="/menu" class="block text-gray-300 py-2">Cardápio</a>
                <a href="/gallery" class="block text-brand-400 font-medium py-2">Galeria</a>
                <a href="/about" class="block text-gray-300 py-2">Sobre</a>
                <a href="/contact" class="block text-gray-300 py-2">Contato</a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="pt-32 pb-16 bg-dark-900">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-brand-400 font-medium tracking-widest uppercase text-sm mb-3">Galeria</p>
            <h1 class="font-display text-4xl md:text-6xl font-bold text-white mb-4">Nossos Momentos</h1>
            <p class="text-gray-400 text-lg max-w-2xl mx-auto">Cada imagem conta a história do nosso cuidado com cada
                detalhe.</p>
        </div>
    </section>

    <!-- GALLERY GRID -->
    <section class="pb-20 bg-dark-900">
        <div class="max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="gallery-grid">
                <!-- Skeleton will be injected by JS -->
            </div>
        </div>
    </section>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()" aria-label="Fechar">
            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <button class="lightbox-nav lightbox-prev" onclick="prevImage()" aria-label="Anterior">‹</button>
        <img id="lightbox-img" src="" alt="">
        <button class="lightbox-nav lightbox-next" onclick="nextImage()" aria-label="Próximo">›</button>
    </div>

    <!-- FOOTER -->
    <footer class="bg-dark-900 border-t border-white/5 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-gray-600 text-sm" id="footer-copy">© 2026 Sabor & Arte</p>
        </div>
    </footer>

    <!-- WHATSAPP -->
    <a href="#" id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
        </svg>
    </a>

    <script src="/js/performance.js"></script>
    <script src="/js/mobile.js"></script>
    <script src="/js/a11y.js"></script>
    <script src="/js/feedback.js"></script>
    <script src="/js/formValidation.js"></script>
    <script src="/js/app.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/whatsappFormatter.js"></script>
    <script src="/js/orderModal.js"></script>
    <script src="/js/cartUI.js"></script>
    <script>
        let galleryImages = [];
        let currentIndex = 0;

        function escapeHTMLGallery(value) {
            const div = document.createElement('div');
            div.textContent = value ?? '';
            return div.innerHTML;
        }
        function escapeAttrGallery(value) {
            return escapeHTMLGallery(value).replace(/"/g, '&quot;').replace(/'/g, '&#39;');
        }

        async function loadGallery() {
            // Show gallery skeleton loaders
            var grid = document.getElementById('gallery-grid');
            if (window.feedback && window.feedback.skeletons) {
                grid.innerHTML = window.feedback.skeletons.gallery(8);
            }

            const data = await api('/gallery');

            if (!data || data.length === 0) {
                const grid = document.getElementById('gallery-grid');
                grid.innerHTML = '<div class="text-center py-20 col-span-full text-gray-500">Nenhuma imagem na galeria ainda. Adicione fotos pelo painel admin.</div>';
                return;
            }

            galleryImages = data;
            const grid = document.getElementById('gallery-grid');
            grid.textContent = '';
            galleryImages.forEach(function (img, i) {
                var item = document.createElement('div');
                item.className = 'gallery-item aspect-square';
                item.dataset.index = i;

                var image = document.createElement('img');
                image.src = img.src;
                image.alt = img.alt || '';
                image.className = 'w-full h-full object-cover';
                image.loading = 'lazy';
                item.appendChild(image);

                item.addEventListener('click', function () { openLightbox(i); });
                grid.appendChild(item);
            });
        }

        function openLightbox(index) {
            currentIndex = index;
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = galleryImages[index].src;
            lbImg.alt = galleryImages[index].alt || '';
            var lb = document.getElementById('lightbox');
            lb.classList.add('active');
            lb.setAttribute('role', 'dialog');
            lb.setAttribute('aria-modal', 'true');
            lb.setAttribute('aria-label', 'Visualizador de imagem');
            document.body.style.overflow = 'hidden';
            // Focus close button for keyboard accessibility
            var closeBtn = lb.querySelector('.lightbox-close');
            if (closeBtn) setTimeout(function () { closeBtn.focus(); }, 100);
        }

        function closeLightbox() {
            var lb = document.getElementById('lightbox');
            lb.classList.remove('active');
            lb.removeAttribute('aria-modal');
            document.body.style.overflow = '';
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % galleryImages.length;
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = galleryImages[currentIndex].src;
            lbImg.alt = galleryImages[currentIndex].alt || '';
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
            const lbImg = document.getElementById('lightbox-img');
            lbImg.src = galleryImages[currentIndex].src;
            lbImg.alt = galleryImages[currentIndex].alt || '';
        }

        // Keyboard navigation + focus trap
        document.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            if (!lb.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();

            // Focus trap inside lightbox
            if (e.key === 'Tab') {
                var focusable = lb.querySelectorAll('button:not([disabled])');
                var els = Array.prototype.slice.call(focusable);
                if (els.length === 0) return;
                var first = els[0];
                var last = els[els.length - 1];
                if (e.shiftKey && document.activeElement === first) {
                    e.preventDefault(); last.focus();
                } else if (!e.shiftKey && document.activeElement === last) {
                    e.preventDefault(); first.focus();
                }
            }
        });

        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>

</html>
