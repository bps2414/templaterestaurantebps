<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galeria — Burger House</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
        href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700;800;900&family=Outfit:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        cream: { 50: '#FFF8F0', 100: '#FFF0E0', 200: '#FFE4C9' },
                        fire: { 400: '#EF4444', 500: '#DC2626', 600: '#B91C1C', 700: '#991B1B' },
                        gold: { 300: '#FCD34D', 400: '#FBBF24', 500: '#F59E0B' },
                        charcoal: { 800: '#1F1F1F', 900: '#111111' },
                    }, fontFamily: { display: ['Barlow Condensed', 'sans-serif'], body: ['Outfit', 'sans-serif'] }
                }
            }
        };
    </script>
    <style>
        body {
            font-family: 'Outfit', sans-serif;
            background: #FFF8F0;
            color: #1F1F1F;
        }

        .font-display {
            font-family: 'Barlow Condensed', sans-serif;
            text-transform: uppercase;
        }

        .nav-warm {
            backdrop-filter: blur(16px);
            background: rgba(17, 17, 17, 0.95);
            border-bottom: 1px solid rgba(251, 191, 36, 0.2);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 999;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: #25d366;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 20px rgba(37, 211, 102, 0.5);
            transition: transform 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
        }

        .gallery-item {
            cursor: pointer;
            overflow: hidden;
            border-radius: 1rem;
        }

        .gallery-item img {
            transition: transform 0.5s ease;
        }

        .gallery-item:hover img {
            transform: scale(1.1);
        }

        .lightbox {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.95);
            align-items: center;
            justify-content: center;
        }

        .lightbox.active {
            display: flex;
        }

        .lightbox img {
            max-width: 90vw;
            max-height: 85vh;
            object-fit: contain;
            border-radius: 0.75rem;
        }

        .lightbox-close {
            position: absolute;
            top: 20px;
            right: 20px;
            color: white;
            cursor: pointer;
            z-index: 10000;
        }

        .lightbox-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            color: white;
            cursor: pointer;
            padding: 16px;
            font-size: 2rem;
        }

        .lightbox-prev {
            left: 16px;
        }

        .lightbox-next {
            right: 16px;
        }

        .gold-line {
            width: 80px;
            height: 3px;
            background: linear-gradient(90deg, transparent, #DC2626, #FBBF24, transparent);
            margin: 0 auto;
            border-radius: 2px;
        }

        .separator {
            display: flex;
            align-items: center;
            gap: 16px;
            justify-content: center;
        }

        .separator::before,
        .separator::after {
            content: '';
            width: 40px;
            height: 2px;
            background: #FBBF24;
        }
    </style>
</head>

<body>

    <!-- NAVBAR -->
    <nav class="nav-warm fixed top-0 w-full z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16 md:h-20">
                <a href="/" class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-fire-500 flex items-center justify-center shadow-md">
                        <span class="text-cream-50 text-lg">🍔</span>
                    </div>
                    <span class="font-display text-xl md:text-2xl font-bold text-white" id="nav-brand">Burger
                        House</span>
                </a>
                <div class="hidden md:flex items-center gap-8">
                    <a href="/" class="text-white/60 hover:text-gold-400 transition text-sm">Início</a>
                    <a href="/menu" class="text-white/60 hover:text-gold-400 transition text-sm">Cardápio</a>
                    <a href="/gallery" class="text-gold-400 font-medium text-sm">Galeria</a>
                    <a href="/about" class="text-white/60 hover:text-gold-400 transition text-sm">Sobre</a>
                    <a href="/contact" class="text-white/60 hover:text-gold-400 transition text-sm">Contato</a>
                </div>
                <button id="menu-toggle" class="md:hidden text-white p-2"><svg class="w-6 h-6" fill="none"
                        viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M4 6h16M4 12h16M4 18h16" />
                    </svg></button>
            </div>
        </div>
        <div id="mobile-menu" class="hidden md:hidden bg-charcoal-900/95 backdrop-blur border-t border-gold-400/20">
            <div class="px-4 py-4 space-y-3">
                <a href="/" class="block text-white/60 py-2">Início</a>
                <a href="/menu" class="block text-white/60 py-2">Cardápio</a>
                <a href="/gallery" class="block text-gold-400 font-medium py-2">Galeria</a>
                <a href="/about" class="block text-white/60 py-2">Sobre</a>
                <a href="/contact" class="block text-white/60 py-2">Contato</a>
            </div>
        </div>
    </nav>

    <!-- HERO -->
    <section class="pt-32 pb-16 bg-cream-50">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <div class="separator mb-4"><span
                    class="text-fire-500 text-xs tracking-[0.3em] uppercase font-medium">Galeria</span></div>
            <h1 class="font-display text-4xl md:text-6xl font-extrabold text-charcoal-900 mb-4">Nossos Burgers</h1>
            <p class="text-charcoal-800/50 text-lg max-w-2xl mx-auto">Cada foto mostra o cuidado e a qualidade dos nossos hambúrgueres.</p>
            <div class="gold-line mt-6"></div>
        </div>
    </section>

    <!-- GALLERY GRID -->
    <section class="pb-20 bg-cream-50">
        <div class="max-w-7xl mx-auto px-4">
            <div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4" id="gallery-grid">
                <div class="text-center py-20 col-span-full text-charcoal-800/40">Carregando galeria...</div>
            </div>
        </div>
    </section>

    <!-- LIGHTBOX -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" onclick="closeLightbox()" aria-label="Fechar">
            <svg class="w-8 h-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
            </svg>
        </button>
        <button class="lightbox-nav lightbox-prev" onclick="prevImage()" aria-label="Anterior">‹</button>
        <img id="lightbox-img" src="" alt="">
        <button class="lightbox-nav lightbox-next" onclick="nextImage()" aria-label="Próximo">›</button>
    </div>

    <!-- FOOTER -->
    <footer class="bg-charcoal-900 py-12">
        <div class="max-w-7xl mx-auto px-4 text-center">
            <p class="text-white/30 text-sm" id="footer-copy">© 2026 Burger House</p>
        </div>
    </footer>

    <!-- WHATSAPP -->
    <a href="#" id="whatsapp-float" class="whatsapp-float" target="_blank" rel="noopener">
        <svg class="w-7 h-7 text-white" fill="currentColor" viewBox="0 0 24 24">
            <path
                d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z" />
        </svg>
    </a>

    <script src="/js/app.js"></script>
    <script src="/js/cart.js"></script>
    <script src="/js/whatsappFormatter.js"></script>
    <script src="/js/orderModal.js"></script>
    <script src="/js/cartUI.js"></script>
    <script>
        let galleryImages = [];
        let currentIndex = 0;

        const fallbackImages = [
            { src: 'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600&q=80', alt: 'Hambúrguer artesanal' },
            { src: 'https://images.unsplash.com/photo-1550547660-d9450f859349?w=600&q=80', alt: 'Cheeseburger duplo' },
            { src: 'https://images.unsplash.com/photo-1594212699903-ec8a3eca50f5?w=600&q=80', alt: 'Burger gourmet' },
            { src: 'https://images.unsplash.com/photo-1586190848861-99aa4a171e90?w=600&q=80', alt: 'Batata frita crocante' },
            { src: 'https://images.unsplash.com/photo-1561758033-d89a9ad46330?w=600&q=80', alt: 'Smash burger' },
            { src: 'https://images.unsplash.com/photo-1572802419224-296b0aeee0d9?w=600&q=80', alt: 'Onion rings' },
            { src: 'https://images.unsplash.com/photo-1553979459-d2229ba7433b?w=600&q=80', alt: 'X-Bacon' },
            { src: 'https://images.unsplash.com/photo-1571091718767-18b5b1457add?w=600&q=80', alt: 'Burger com cheddar' },
        ];

        async function loadGallery() {
            const data = await api('/gallery');
            galleryImages = (data && data.length > 0) ? data : fallbackImages;

            const grid = document.getElementById('gallery-grid');
            grid.innerHTML = galleryImages.map((img, i) => `
                <div class="gallery-item aspect-square shadow-sm border border-gold-400/10" onclick="openLightbox(${i})">
                    <img src="${img.src}" alt="${img.alt || ''}" class="w-full h-full object-cover" loading="lazy">
                </div>
            `).join('');
        }

        function openLightbox(index) {
            currentIndex = index;
            document.getElementById('lightbox-img').src = galleryImages[index].src;
            document.getElementById('lightbox').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('active');
            document.body.style.overflow = '';
        }

        function nextImage() {
            currentIndex = (currentIndex + 1) % galleryImages.length;
            document.getElementById('lightbox-img').src = galleryImages[currentIndex].src;
        }

        function prevImage() {
            currentIndex = (currentIndex - 1 + galleryImages.length) % galleryImages.length;
            document.getElementById('lightbox-img').src = galleryImages[currentIndex].src;
        }

        document.addEventListener('keydown', (e) => {
            const lb = document.getElementById('lightbox');
            if (!lb.classList.contains('active')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowRight') nextImage();
            if (e.key === 'ArrowLeft') prevImage();
        });

        document.addEventListener('DOMContentLoaded', loadGallery);
    </script>
</body>

</html>
