name: Weekly Database Backup

# Roda todo domingo às 3am UTC (0h BRT)
on:
  schedule:
    - cron: '0 3 * * 0'
  
  # Permite rodar manualmente
  workflow_dispatch:

jobs:
  backup-databases:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - name: Backup All Client Databases
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          echo "🗄️  Iniciando backup semanal - $(date)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # ====== LISTA DE CLIENTES ======
          # Adicione cada cliente aqui conforme for vendendo.
          # Formato: PROJECT_ID (pegar no Neon Dashboard)
          
          CLIENTS=(
            # "ep-ancient-pond-af1vq6j6"  # restaurante-saborarte
            # "ep-cool-forest-a8k3jf9s"   # pizzaria-napoli
          )
          
          if [ ${#CLIENTS[@]} -eq 0 ]; then
            echo "⚠️  Nenhum cliente cadastrado ainda."
            echo "   Edite .github/workflows/backup.yml e adicione na array CLIENTS."
            exit 0
          fi
          
          # Backup via Neon Branching (point-in-time snapshot)
          SUCCESS=0
          FAILED=0
          
          for PROJECT_ID in "${CLIENTS[@]}"; do
            BACKUP_NAME="backup-$(date +%Y%m%d)"
            
            echo ""
            echo "📦 Backup: $PROJECT_ID → $BACKUP_NAME"
            
            RESPONSE=$(curl -s -X POST \
              "https://console.neon.tech/api/v2/projects/$PROJECT_ID/branches" \
              -H "Authorization: Bearer $NEON_API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                \"branch\": {
                  \"name\": \"$BACKUP_NAME\",
                  \"parent_id\": \"main\"
                }
              }")
            
            if echo "$RESPONSE" | grep -q '"id"'; then
              BRANCH_ID=$(echo "$RESPONSE" | grep -o '"id":"[^"]*' | head -1 | cut -d'"' -f4)
              echo "   ✅ Branch criado! ID: $BRANCH_ID"
              ((SUCCESS++))
            else
              echo "   ❌ Falhou! Response: $RESPONSE"
              ((FAILED++))
            fi
          done
          
          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "✅ BACKUP CONCLUÍDO"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "Sucesso:   $SUCCESS clientes"
          echo "Falhas:    $FAILED clientes"
          echo ""
          echo "💡 Para restaurar um backup:"
          echo "   1. Acesse https://console.neon.tech"
          echo "   2. Selecione o projeto"
          echo "   3. Branches → escolha o backup → Restore"
          echo ""
          
          # Falhar workflow se algum backup falhou
          if [ $FAILED -gt 0 ]; then
            exit 1
          fi
      
      - name: Cleanup Old Backups
        if: success()
        env:
          NEON_API_KEY: ${{ secrets.NEON_API_KEY }}
        run: |
          echo "🧹 Limpando backups antigos (mantendo últimos 4)..."
          
          # Para cada cliente, listar branches e deletar os mais antigos
          CLIENTS=(
            # "ep-ancient-pond-af1vq6j6"
          )
          
          for PROJECT_ID in "${CLIENTS[@]}"; do
            echo "Limpando: $PROJECT_ID"
            
            # Listar branches
            BRANCHES=$(curl -s \
              "https://console.neon.tech/api/v2/projects/$PROJECT_ID/branches" \
              -H "Authorization: Bearer $NEON_API_KEY")
            
            # Filtrar branches de backup (começam com "backup-")
            # Ordenar por data e manter apenas os 4 mais recentes
            BACKUP_BRANCHES=$(echo "$BRANCHES" | \
              grep -o '"name":"backup-[^"]*' | \
              cut -d'"' -f4 | \
              sort -r | \
              tail -n +5)
            
            # Deletar branches antigos
            for BRANCH_NAME in $BACKUP_BRANCHES; do
              BRANCH_ID=$(echo "$BRANCHES" | \
                grep -B 2 "\"name\":\"$BRANCH_NAME\"" | \
                grep -o '"id":"[^"]*' | \
                cut -d'"' -f4)
              
              if [ -n "$BRANCH_ID" ]; then
                echo "   🗑️  Deletando: $BRANCH_NAME"
                curl -s -X DELETE \
                  "https://console.neon.tech/api/v2/projects/$PROJECT_ID/branches/$BRANCH_ID" \
                  -H "Authorization: Bearer $NEON_API_KEY"
              fi
            done
          done
          
          echo "✅ Limpeza concluída!"
