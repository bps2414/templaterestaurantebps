<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" fill="none">
  <defs>
    <linearGradient id="bg-grad" x1="0" y1="0" x2="1200" y2="700" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#E0E7FF"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
    </linearGradient>
    <linearGradient id="card-grad" x1="400" y1="150" x2="800" y2="550" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0B6EFD"/>
      <stop offset="100%" stop-color="#7C3AED"/>
    </linearGradient>
  </defs>
  <!-- Background blobs -->
  <rect width="1200" height="700" fill="url(#bg-grad)" rx="0"/>
  <circle cx="200" cy="600" r="300" fill="#0B6EFD" opacity="0.06"/>
  <circle cx="1000" cy="100" r="250" fill="#7C3AED" opacity="0.06"/>
  <!-- Dashboard card -->
  <rect x="380" y="120" width="440" height="460" rx="24" fill="#fff" stroke="#E2E8F0" stroke-width="2"/>
  <rect x="380" y="120" width="440" height="80" rx="24" fill="url(#card-grad)"/>
  <rect x="380" y="176" width="440" height="24" fill="url(#card-grad)"/>
  <!-- Header dots -->
  <circle cx="412" cy="160" r="8" fill="#fff" opacity="0.5"/>
  <circle cx="436" cy="160" r="8" fill="#fff" opacity="0.5"/>
  <circle cx="460" cy="160" r="8" fill="#fff" opacity="0.5"/>
  <!-- Chart bars -->
  <rect x="420" y="380" width="40" height="160" rx="6" fill="#0B6EFD" opacity="0.7"/>
  <rect x="480" y="320" width="40" height="220" rx="6" fill="#0B6EFD" opacity="0.85"/>
  <rect x="540" y="280" width="40" height="260" rx="6" fill="#7C3AED" opacity="0.8"/>
  <rect x="600" y="350" width="40" height="190" rx="6" fill="#0B6EFD" opacity="0.7"/>
  <rect x="660" y="260" width="40" height="280" rx="6" fill="#7C3AED" opacity="0.9"/>
  <rect x="720" y="300" width="40" height="240" rx="6" fill="#0B6EFD" opacity="0.75"/>
  <!-- Stat cards -->
  <rect x="420" y="220" width="160" height="60" rx="10" fill="#F1F5F9"/>
  <rect x="440" y="236" width="80" height="12" rx="4" fill="#0B6EFD" opacity="0.6"/>
  <rect x="440" y="256" width="50" height="10" rx="4" fill="#94A3B8"/>
  <rect x="610" y="220" width="160" height="60" rx="10" fill="#F1F5F9"/>
  <rect x="630" y="236" width="80" height="12" rx="4" fill="#7C3AED" opacity="0.6"/>
  <rect x="630" y="256" width="50" height="10" rx="4" fill="#94A3B8"/>
  <!-- Floating elements -->
  <rect x="840" y="200" width="180" height="100" rx="16" fill="#fff" stroke="#E2E8F0" stroke-width="1.5" opacity="0.9"/>
  <circle cx="872" cy="236" r="14" fill="#10B981"/>
  <rect x="896" y="228" width="90" height="10" rx="4" fill="#0F172A" opacity="0.6"/>
  <rect x="896" y="248" width="60" height="8" rx="4" fill="#94A3B8"/>
  <rect x="856" y="270" width="140" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="856" y="270" width="100" height="8" rx="4" fill="#10B981" opacity="0.5"/>
  <rect x="160" y="280" width="180" height="100" rx="16" fill="#fff" stroke="#E2E8F0" stroke-width="1.5" opacity="0.9"/>
  <circle cx="192" cy="316" r="14" fill="#0B6EFD"/>
  <rect x="216" y="308" width="90" height="10" rx="4" fill="#0F172A" opacity="0.6"/>
  <rect x="216" y="328" width="60" height="8" rx="4" fill="#94A3B8"/>
  <rect x="176" y="350" width="140" height="8" rx="4" fill="#E2E8F0"/>
  <rect x="176" y="350" width="80" height="8" rx="4" fill="#0B6EFD" opacity="0.5"/>
  <!-- Decorative circles -->
  <circle cx="900" cy="480" r="60" fill="#7C3AED" opacity="0.08"/>
  <circle cx="150" cy="180" r="40" fill="#0B6EFD" opacity="0.08"/>
